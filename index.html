        function getOrCreateStorageId(key) {
            let value = localStorage.getItem(key);
            if (!value) {
                value = crypto.randomUUID();
                localStorage.setItem(key, value);
            }
            return value;
        }

        function isoNow() {
            return new Date().toISOString();
        }

        function durationSec(fromIso, toIso) {
            if (!fromIso || !toIso) {
                return "";
            }
            return Math.max(0, Math.round((Date.parse(toIso) - Date.parse(fromIso)) / 1000));
        }

        function buildLogPayload(eventType, note = "") {
            const nowIso = isoNow();
            lastSeenAtIso = nowIso;
            return {
                event_type: eventType,
                session_id: sessionId,
                user_id: userId,
                spot_id: SPOT_ID,
                page_url: location.href,
                lang: currentLang,
                entered_at: enteredAtIso,
                left_at: eventType === "page_leave" ? nowIso : "",
                last_seen_at: nowIso,
                duration_sec: durationSec(enteredAtIso, nowIso),
                visibility_state: document.visibilityState,
                user_agent: navigator.userAgent,
                note
            };
        }

        function sendLog(eventType, note = "") {
            if (!loggingEnabled || !LOG_ENDPOINT) {
                return;
            }

            const payload = buildLogPayload(eventType, note);
            const body = JSON.stringify(payload);

            try {
                if (navigator.sendBeacon) {
                    const blob = new Blob([body], { type: "application/json" });
                    if (navigator.sendBeacon(LOG_ENDPOINT, blob)) {
                        return;
                    }
                }
            } catch (error) {
                console.warn("sendBeacon failed", error);
            }

            fetch(LOG_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body,
                mode: "cors",
                keepalive: true
            }).catch(error => {
                console.warn("log post failed", error);
            });
        }

        function startLogging() {
            userId = getOrCreateStorageId(USER_ID_KEY);
            sessionId = crypto.randomUUID();

            lastSeenAtIso = enteredAtIso;

            }
            heartbeatTimer = setInterval(() => {

        function degreesToRadians(deg) {
            return deg * Math.PI / 180;
        }

        function radiansToDegrees(rad) {
            return rad * 180 / Math.PI;
        }

        function normalizeDegrees(deg) {
            return ((deg % 360) + 360) % 360;
        }

        function getScreenOrientationRad() {
            if (screen.orientation && typeof screen.orientation.angle === "number") {
                return degreesToRadians(screen.orientation.angle);
            }
            if (typeof window.orientation === "number") {
                return degreesToRadians(window.orientation);
            }
            return 0;
        }

        function setCameraQuaternionFromDeviceData(quaternion, alpha, beta, gamma, orient) {
            euler.set(beta, alpha, -gamma, "YXZ");
            quaternion.setFromEuler(euler);
            quaternion.multiply(q1);
            quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
        }

        function setupIosOrientationFallback() {
            if (iosOrientationListening) {
                return;
            }

            iosOrientationListening = true;

            window.addEventListener("deviceorientation", event => {
                if (typeof event.webkitCompassHeading === "number") {
                    currentHeading = normalizeDegrees(event.webkitCompassHeading);
                    useManualOrientation = true;
                    manualAlpha = degreesToRadians(360 - event.webkitCompassHeading);
                } else if (typeof event.alpha === "number") {
                    currentHeading = normalizeDegrees(360 - event.alpha);
                    manualAlpha = degreesToRadians(event.alpha);
                }

                manualBeta = degreesToRadians(event.beta || 0);
                manualGamma = degreesToRadians(event.gamma || 0);
                screenOrientationRad = getScreenOrientationRad();
            }, true);

            window.addEventListener("orientationchange", () => {
                screenOrientationRad = getScreenOrientationRad();
            });
        }

        function destinationPoint(lat, lon, bearingDeg, distanceMeters) {
            const radius = 6378137;
            const bearing = degreesToRadians(bearingDeg);
            const lat1 = degreesToRadians(lat);
            const lon1 = degreesToRadians(lon);
            const angularDistance = distanceMeters / radius;

            const lat2 = Math.asin(
                Math.sin(lat1) * Math.cos(angularDistance) +
                Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing)
            );

            const lon2 = lon1 + Math.atan2(
                Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
                Math.cos(angularDistance) - Math.sin(lat1) * Math.sin(lat2)
            );

            return {
                lat: radiansToDegrees(lat2),
                lon: radiansToDegrees(lon2)
            };
        }

        function getCurrentDescription() {
            const group = descriptions[currentModelKey] || descriptions.all;
            return group[currentLang] || group.Japanese || "";
        }

        function showTextPanel(text) {
            const content = text || "";
            textScroll.textContent = content;
            textPanel.classList.add("show");

            requestAnimationFrame(() => {
                const panelHeight = textPanel.clientHeight;
                const textHeight = textScroll.scrollHeight;
                const fromY = panelHeight;
                const toY = -textHeight;
                const duration = Math.max(6000, content.length * 120);
                textScroll.animate(
                    [
                        { transform: `translate(-50%, ${fromY}px)` },
                        { transform: `translate(-50%, ${toY}px)` }
                    ],
                    {
                        duration,
                        easing: "linear",
                        fill: "forwards"
                    }
                );

                if (panelHideTimer) {
                    clearTimeout(panelHideTimer);
                }
                panelHideTimer = setTimeout(() => {
                    textPanel.classList.remove("show");
                }, duration + 3000);
            });
        }

        function applyModelTransform() {
            contentRoot.position.set(0, currentHeight, 0);
            contentRoot.scale.setScalar(currentScale);
            modelHolder.rotation.set(0, degreesToRadians(currentRotation), 0);
        }

        async function loadModelObject(key) {
            if (modelCache.has(key)) {
                return clone(modelCache.get(key));
            }

            const fileName = appData[key];
            const gltf = await loader.loadAsync(fileName);
            gltf.scene.traverse(obj => {
                if (obj.isMesh) {
                    obj.frustumCulled = false;
                    if (obj.material) {
                        obj.material.needsUpdate = true;
                    }
                }
            });
            modelCache.set(key, gltf.scene);
            return clone(gltf.scene);
        }

        async function switchModel(key) {
            currentModelKey = key;
            document.querySelectorAll(".left-menu button[id^='m-']").forEach(button => button.classList.remove("active-btn"));
            const btn = document.getElementById("m-" + key);
            if (btn) {
                btn.classList.add("active-btn");
            }

            setStatus(`繝｢繝・Ν繧定ｪｭ縺ｿ霎ｼ繧薙〒縺・∪縺・ ${key}`);
            try {
                const nextObject = await loadModelObject(key);
                if (currentModelObject) {
                    modelHolder.remove(currentModelObject);
                }
                currentModelObject = nextObject;
                modelHolder.add(currentModelObject);
                applyModelTransform();
                showTextPanel(getCurrentDescription());
                setStatus(`繝｢繝・Ν繧定｡ｨ遉ｺ縺励∪縺励◆: ${key}`);
                sendLog("model_switch", `model=${key}`);
            } catch (error) {
                setStatus(`繝｢繝・Ν隱ｭ縺ｿ霎ｼ縺ｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆: ${error.message || error}`);
                sendLog("model_error", `model=${key} error=${error.message || error}`);
            }
        }
        window.switchModel = switchModel;

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll(".top-center button[id^='lang-']").forEach(button => button.classList.remove("active-btn"));
            document.getElementById("lang-" + lang).classList.add("active-btn");
            showTextPanel(getCurrentDescription());
            sendLog("lang_change", `lang=${lang}`);
        }
        window.setLang = setLang;

        function adjustRotation(delta) {
            currentRotation += delta;
            applyModelTransform();
        }
        window.adjustRotation = adjustRotation;

        function adjustHeight(delta) {
            currentHeight += delta;
            applyModelTransform();
        }
        window.adjustHeight = adjustHeight;

        function adjustScale(factor) {
            currentScale *= factor;
            applyModelTransform();
        }
        window.adjustScale = adjustScale;

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }
        window.stopAllAudio = stopAllAudio;

        function playAudio(key) {
            currentModelKey = key;
            stopAllAudio();
            const fileName = `audio/${audioFiles[key]}${currentLang}.wav`;
            currentAudio = new Audio(fileName);
            currentAudio.play().catch(() => {
                setStatus("髻ｳ螢ｰ縺ｮ蜀咲函縺ｫ螟ｱ謨励＠縺ｾ縺励◆縲・);
                sendLog("audio_error", `file=${fileName}`);
            });
            showTextPanel(getCurrentDescription());
            sendLog("audio_play", `key=${key} file=${fileName}`);
        }
        window.playAudio = playAudio;

        function lockAnchor(target, type, message) {
            if (!locar || !target) {
                return;
            }

            lockedAnchorTarget = { lat: target.lat, lon: target.lon };
            lockedAnchorType = type;

            if (anchorGroup.parent) {
                anchorGroup.parent.remove(anchorGroup);
            }
            locar.add(anchorGroup, lockedAnchorTarget.lon, lockedAnchorTarget.lat, 0);

            document.querySelectorAll(".loc-btn").forEach(button => button.classList.remove("active-btn"));
            const btn = document.getElementById("btn-" + type);
            if (btn) {
                btn.classList.add("active-btn");
            }

            setStatus(message);
            sendLog("anchor_lock", `type=${type} lat=${target.lat} lon=${target.lon}`);
        }

        function resolveAnchorTarget(type) {
            if (type === "current") {
                if (!userLoc) {
                    return null;
                }
                const bearing = typeof currentHeading === "number" ? currentHeading : 0;
                return destinationPoint(userLoc.lat, userLoc.lon, bearing, 15);
            }
            return locations[type] || null;
        }

        function setAnchorLocation(type) {
            const target = resolveAnchorTarget(type);
            if (!target) {
                setStatus("迴ｾ蝨ｨ蝨ｰ縺後∪縺蜿門ｾ励〒縺阪※縺・∪縺帙ｓ縲・R髢句ｧ句ｾ後；PS蜿門ｾ励ｒ蠕・▲縺ｦ縺上□縺輔＞縲・);
                return;
            }

            if (type === "current") {
                lockAnchor(target, type, "迴ｾ蝨ｨ蝨ｰ縺ｮ蜑肴婿15m縺ｫ蝗ｺ螳壹＠縺ｾ縺励◆縲ゆｻ･蠕後・縺薙・GPS蠎ｧ讓吶∈蝗ｺ螳壹＠縺ｾ縺吶・);
            } else {
                lockAnchor(target, type, "謖・ｮ壼慍轤ｹ縺ｫ蝗ｺ螳壹＠縺ｾ縺励◆縲ゆｻ･蠕後・縺薙・GPS蠎ｧ讓吶∈蝗ｺ螳壹＠縺ｾ縺吶・);
            }
        }
        window.setAnchorLocation = setAnchorLocation;

        async function showDiagnostics() {
            const diagnostics = {
                secureContext: window.isSecureContext,
                protocol: window.location.protocol,
                host: window.location.host || "(file)",
                mediaDevices: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                geolocation: !!navigator.geolocation,
                arStarted,
                userLoc,
                lockedAnchorTarget
            };

            setStatus(`險ｺ譁ｭ: secure=${diagnostics.secureContext} / media=${diagnostics.mediaDevices} / geo=${diagnostics.geolocation} / arStarted=${diagnostics.arStarted}`);
            console.log("[locar-diagnostics]", diagnostics);
            sendLog("diagnostics", JSON.stringify(diagnostics));
        }
        window.showDiagnostics = showDiagnostics;

        async function startAr() {
            if (arStarted) {
                setStatus("AR縺ｯ髢句ｧ区ｸ医∩縺ｧ縺吶・);
                return;
            }

            if (!window.isSecureContext) {
                setStatus("AR髢句ｧ倶ｸ榊庄: HTTPS 縺ｾ縺溘・ localhost 縺ｧ髢九＞縺ｦ縺上□縺輔＞縲・);
                return;
            }

            try {
                setStatus("繧ｫ繝｡繝ｩ縺ｨGPS繧貞・譛溷喧縺励※縺・∪縺・..");
                sendLog("ar_start", "initializing camera and gps");

                webcam = new LocAR.Webcam({
                    video: {
                        facingMode: { ideal: "environment" }
                    }
                });

                webcam.on("webcamstarted", event => {
                    scene.background = event.texture;
                    setStatus("繧ｫ繝｡繝ｩ譏蜒上ｒ髢句ｧ九＠縺ｾ縺励◆縲・PS繧貞ｾ・▲縺ｦ縺・∪縺・..");
                    sendLog("camera_started", "webcamstarted");
                });

                webcam.on("webcamerror", error => {
                    setStatus(`繧ｫ繝｡繝ｩ髢句ｧ九↓螟ｱ謨励＠縺ｾ縺励◆: ${error?.message || "unknown"}`);
                    sendLog("camera_error", error?.message || "unknown");
                });

                locar = new LocAR.LocationBased(scene, camera);
                locar.on("gpsupdate", event => {
                    const coords = event?.position?.coords;
                    if (!coords) {
                        return;
                    }

                    userLoc = {
                        lat: coords.latitude,
                        lon: coords.longitude,
                        accuracy: coords.accuracy
                    };

                    if (!lockedAnchorTarget) {
                        setStatus("GPS OK縲ょ崋螳壼ｴ謇繧帝∈繧薙〒縺上□縺輔＞縲・);
                    }
                    sendLog("gps_update", `lat=${userLoc.lat} lon=${userLoc.lon} acc=${userLoc.accuracy}`);
                });

                locar.on("gpserror", error => {
                    const message = error?.message || error?.detail?.message || "unknown";
                    setStatus(`GPS蜿門ｾ励↓螟ｱ謨励＠縺ｾ縺励◆: ${message}`);
                    sendLog("gps_error", message);
                });

                deviceControls = new LocAR.DeviceOrientationControls(camera);
                deviceControls.on("deviceorientationgranted", event => {
                    event.target.connect();
                    setStatus("譁ｹ菴阪そ繝ｳ繧ｵ繝ｼ繧定ｨｱ蜿ｯ縺励∪縺励◆縲・);
                    sendLog("orientation_granted", "deviceorientationgranted");
                });
                deviceControls.on("deviceorientationerror", error => {
                    setStatus(`譁ｹ菴阪そ繝ｳ繧ｵ繝ｼ縺ｫ螟ｱ謨励＠縺ｾ縺励◆: ${error?.message || "unknown"}`);
                    sendLog("orientation_error", error?.message || "unknown");
                });
                deviceControls.on("deviceorientation", event => {
                    if (typeof event?.alpha === "number") {
                        currentHeading = normalizeDegrees(360 - event.alpha);
                    }
                });

                setupIosOrientationFallback();
                await deviceControls.init();
                locar.startGps();
                arStarted = true;
                await switchModel("all");
                sendLog("ar_ready", "ar started successfully");
            } catch (error) {
                setStatus(`AR髢句ｧ九↓螟ｱ謨励＠縺ｾ縺励◆: ${error.message || error}`);
                sendLog("ar_error", error.message || String(error));
            }
        }
        window.startAr = startAr;

        function animate() {
            requestAnimationFrame(animate);
            if (deviceControls) {
                deviceControls.update();
            }
            if (useManualOrientation) {
                setCameraQuaternionFromDeviceData(
                    camera.quaternion,
                    manualAlpha,
                    manualBeta,
                    manualGamma,
                    screenOrientationRad
                );
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener("visibilitychange", () => {
            sendLog("visibility_change", `state=${document.visibilityState}`);
        });

        window.addEventListener("pagehide", () => {
            sendLog("page_leave", "pagehide");
        });

        window.addEventListener("beforeunload", () => {
            sendLog("page_leave", "beforeunload");
        });

        startLogging();
        if (!LOG_ENDPOINT) {
            console.warn("LOG_ENDPOINT is empty. Set your Apps Script Web App URL to enable Google Sheets logging.");
        }
    </script>
</body>
</html>
