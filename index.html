        async function showEnvironmentDiagnostics() {
            const diagnostics = {
                secureContext: window.isSecureContext,
                protocol: window.location.protocol,
                host: window.location.host || "(file)",
                geolocationSupported: !!navigator.geolocation,
                userAgent: navigator.userAgent
            };

            if (navigator.permissions && navigator.permissions.query) {
                try {
                    const result = await navigator.permissions.query({ name: "geolocation" });
                    diagnostics.geolocationPermission = result.state;
                } catch (error) {
                    diagnostics.geolocationPermission = "unknown";
                }
            }

            const lines = [
                `secure=${diagnostics.secureContext}`,
                `protocol=${diagnostics.protocol}`,
                `host=${diagnostics.host}`,
                `geo=${diagnostics.geolocationSupported}`,
                `perm=${diagnostics.geolocationPermission || "unknown"}`
            ];

            const message = `診断: ${lines.join(" / ")}`;
            setStatus(message);
            logEvent("diagnostics", message, diagnostics);
        }

        function explainGpsBlockedState() {
            if (!window.isSecureContext) {
                setStatus("GPS開始不可: HTTPS または localhost で開いてください。file:// では取得できないことがあります。");
                logEvent("gps-blocked", "secure context ではありません");
                return true;
            }
            if (!navigator.geolocation) {
                setStatus("このブラウザは位置情報APIに対応していません。");
                logEvent("gps-blocked", "geolocation unsupported");
                return true;
            }
            return false;
        }

        function startGpsWatch(forceRestart = false) {
            if (explainGpsBlockedState()) {
                return;
            }

            if (forceRestart && gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }

            if (gpsWatchId !== null) {
                setStatus("GPS監視はすでに開始済みです。");
                return;
            }

            setStatus("GPS取得を開始しました。権限を許可してください。");
            logEvent("gps-start", "GPS watchPosition を開始しました", { forceRestart });

            if (gpsStartupTimer) {
                clearTimeout(gpsStartupTimer);
            }

            gpsStartupTimer = window.setTimeout(() => {
                if (!userLoc) {
                    setStatus("GPS応答待ちです。位置情報の許可、HTTPS、屋外での受信状態を確認してください。");
                    logEvent("gps-wait-timeout", "GPS初期応答が遅延しています");
                }
            }, 8000);

            gpsWatchId = navigator.geolocation.watchPosition(
                pos => {
                    userLoc = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };

                    if (gpsStartupTimer) {
                        clearTimeout(gpsStartupTimer);
                        gpsStartupTimer = null;
                    }

                    if (statusBar.innerText === "GPSを取得中..." || statusBar.innerText.includes("GPS取得を開始しました")) {
                        setStatus("GPS OK。固定場所を選んでください。");

                    const messageMap = {

                        2: "位置情報を取得できません。屋外で再試行してください。",

        function getFallbackDescription(key, lang) {
            const group = descriptions[key] || descriptions.all;
            return group[lang] || group.Japanese || "";
        }

        async function loadNarrationText(key, lang) {
            if (!textFiles[key]) {
                return getFallbackDescription(key, lang);
            }

            const cacheKey = `${key}-${lang}`;
            if (textCache.has(cacheKey)) {
                return textCache.get(cacheKey);
            }

            const path = `audio/${textFiles[key]}${lang}.txt`;
            try {
                const response = await fetch(path, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const text = (await response.text()).trim();
                textCache.set(cacheKey, text);
                return text;
            } catch (error) {
                const fallback = getFallbackDescription(key, lang);
                textCache.set(cacheKey, fallback);
                return fallback;
            }
        }

        async function showNarrationText(key) {
            const panelComp = getInfoPanelComponent();
            if (!panelComp) {
                return;
            }
            const text = await loadNarrationText(key, currentLang);
            panelComp.play(text);
