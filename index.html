<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <title>文教の森 AR - GPS固定版</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #000;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        #ui-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 120;
            pointer-events: auto;
            background: rgba(33, 33, 33, 0.88);
            color: white;
        }

        .clickable {
            pointer-events: auto;
        }

        .ui-group {
            pointer-events: auto;
        }

        .ui-hidden .ui-group {
            display: none;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            color: #333;
            touch-action: manipulation;
        }

        .active-btn {
            background: #4caf50 !important;
            color: white;
        }

        .loc-btn {
            background: #2196f3;
            color: white;
            width: 100%;
        }

        .rotate-btn {
            background: #9c27b0 !important;
            color: white;
            flex: 1;
        }

        .label {
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 2px;
        }

        .menu {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .top-center {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            width: 95%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diag-row {
            width: 100%;
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .left-menu {
            top: 60px;
            left: 10px;
            width: 165px;
        }

        .right-menu {
            top: 60px;
            right: 10px;
            align-items: flex-end;
            width: 130px;
        }

        #status-bar {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            color: #0f0;
            background: rgba(0, 0, 0, 0.45);
            font-size: 11px;
            padding: 4px 0;
        }
    </style>
</head>

<body>
    <button id="ui-toggle" onclick="toggleUi()">UI OFF</button>
    <div id="ui-layer">
        <div class="top-center clickable ui-group">
            <button id="lang-Japanese" class="active-btn" onclick="setLang('Japanese')">日本語</button>
            <button id="lang-English" onclick="setLang('English')">English</button>

            <div class="diag-row">
                <button style="background:#3f51b5; color:white;" onclick="showCameraDiagnostics()">カメラ診断</button>
            </div>
        </div>

        <div class="left-menu menu clickable ui-group">
            <div class="label">建物を固定する場所</div>
            <button id="btn-current" class="loc-btn" onclick="setAnchorLocation('current')">① 現在地の15m先</button>
            <button id="btn-tas" class="loc-btn" onclick="setAnchorLocation('tas')">② タスホテル</button>
            <button id="btn-kozakura" class="loc-btn" onclick="setAnchorLocation('kozakura')">③ 旧西置賜郡役所</button>

            <button id="m-all" onclick="switchModel('all')">全体(all)</button>
            <div style="display:flex; gap:4px;">
                <button id="m-kozakura" onclick="switchModel('kozakura')">旧西置賜郡役所</button>
                <button class="audio-btn" style="background:#ff9800; color:white; width:35px;" onclick="playAudio('kozakura')">🔊</button>
            </div>
            <div style="display:flex; gap:4px;">
                <button id="m-1st" onclick="switchModel('1st')">初代</button>
                <button class="audio-btn" style="background:#ff9800; color:white; width:35px;" onclick="playAudio('1st')">🔊</button>
            </div>
            <div style="display:flex; gap:4px;">
                <button id="m-2nd" onclick="switchModel('2nd')">二代目</button>
                <button class="audio-btn" style="background:#ff9800; color:white; width:35px;" onclick="playAudio('2nd')">🔊</button>
            </div>
            <button onclick="stopAllAudio()" style="background:#607d8b; color:white; margin-top:4px;">音声停止</button>
        </div>

        <div class="right-menu menu clickable ui-group">
            <div class="label">建物を回転</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button class="rotate-btn" onclick="adjustRotation(-30)">左回</button>
                <button class="rotate-btn" onclick="adjustRotation(30)">右回</button>
            </div>

            <div class="label" style="margin-top:10px;">高度 / サイズ</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustHeight(0.5)">上昇</button>
                <button style="flex:1" onclick="adjustHeight(-0.5)">下降</button>
            </div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustScale(1.2)">拡大</button>
                <button style="flex:1" onclick="adjustScale(0.8)">縮小</button>
            </div>

            <button onclick="location.reload()" style="background:#f44336; color:white; margin-top:10px; width:100%;">再起動</button>
        </div>

        <div id="status-bar" class="ui-group">GPSを取得中...</div>
    </div>

    <a-scene
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; precision: high;"
        arjs="sourceType: webcam; facingMode: environment; videoTexture: true; debugUIEnabled: false;"
    >
        <a-entity id="gps-anchor">
            <a-entity id="content-root" position="0 0 0" scale="0.5 0.5 0.5">
                <a-entity id="main-model" gltf-model="" rotation="0 0 0" frustum-culled="false"></a-entity>

                <a-entity id="info-panel-root" position="0 7 0" visible="false" face-camera>
                    <a-plane
                        id="info-panel"
                        width="7.2"
                        height="4.2"
                        material="shader: flat; transparent: true; opacity: 0.78; color: #10263b; side: double"
                        scrolling-info-panel
                    ></a-plane>

                    <a-plane
                        width="7.26"
                        height="4.26"
                        position="0 0 -0.01"
                        material="shader: flat; transparent: true; opacity: 0.28; color: #cfe8ff; side: double"
                    ></a-plane>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-camera
            id="camera"
            gps-new-camera="gpsMinDistance: 5; positionMinAccuracy: 25;"
            look-controls-enabled="false"
            arjs-device-orientation-controls="smoothingFactor: 0.1"
            camera="near: 0.1; far: 100000"
        ></a-camera>
    </a-scene>

        function escapeCanvasText(text) {
            return String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        }

        function updateStatus(message) {
            statusBar.innerText = message;
        }

        async function showCameraDiagnostics() {
            const diagnostics = {
                secureContext: window.isSecureContext,
                protocol: window.location.protocol,
                host: window.location.host || "(file)",
                mediaDevices: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                userAgent: navigator.userAgent
            };

            if (navigator.permissions && navigator.permissions.query) {
                try {
                    const result = await navigator.permissions.query({ name: "camera" });
                    diagnostics.cameraPermission = result.state;
                } catch (error) {
                    diagnostics.cameraPermission = "unknown";
                }
            }

            const parts = [
                `secure=${diagnostics.secureContext}`,
                `protocol=${diagnostics.protocol}`,
                `host=${diagnostics.host}`,
                `media=${diagnostics.mediaDevices}`,
                `cameraPerm=${diagnostics.cameraPermission || "unknown"}`
            ];

            updateStatus(`カメラ診断: ${parts.join(" / ")}`);
            console.log("[camera-diagnostics]", diagnostics);
        }

        function explainCameraBlockedState() {
            if (!window.isSecureContext) {
                updateStatus("カメラ開始不可: HTTPS または localhost で開いてください。file:// や http:// では表示できないことがあります。");
                return true;
            }

            if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
                updateStatus("このブラウザはカメラAPIに対応していません。");
                return true;
            }

            return false;
        }

        function placeLockedAnchor(target, type, message) {
            if (!target) {
                return;
            }

            lockedAnchorTarget = { lat: target.lat, lon: target.lon };
            lockedAnchorType = type;

            gpsAnchor.removeAttribute("gps-new-entity-place");

            requestAnimationFrame(() => {
                gpsAnchor.setAttribute("gps-new-entity-place", {
                    latitude: lockedAnchorTarget.lat,
                    longitude: lockedAnchorTarget.lon
                });
            });

            document.querySelectorAll(".loc-btn").forEach(button => button.classList.remove("active-btn"));
            const activeButton = document.getElementById("btn-" + type);
            if (activeButton) {
                activeButton.classList.add("active-btn");
            }

            updateStatus(message);
        }

        AFRAME.registerComponent("face-camera", {
            tick: function () {
                const cam = document.getElementById("camera");
                if (!cam || !cam.object3D) {
                    return;
                }

                const myPos = new THREE.Vector3();
                const camPos = new THREE.Vector3();

                this.el.object3D.getWorldPosition(myPos);
                cam.object3D.getWorldPosition(camPos);

                const dx = camPos.x - myPos.x;
                const dz = camPos.z - myPos.z;
                const yaw = Math.atan2(dx, dz) * 180 / Math.PI;

                this.el.setAttribute("rotation", `0 ${yaw} 0`);
            }
        });

        AFRAME.registerComponent("scrolling-info-panel", {
            init: function () {
                this.canvas = document.createElement("canvas");
                this.canvas.width = 1024;
                this.canvas.height = 640;
                this.ctx = this.canvas.getContext("2d");

                this.texture = new THREE.CanvasTexture(this.canvas);
                this.texture.minFilter = THREE.LinearFilter;
                this.texture.magFilter = THREE.LinearFilter;
                this.texture.needsUpdate = true;

                this.scrollY = this.canvas.height + 40;
                this.scrollSpeed = 28;
                this.lastTime = performance.now();
                this.padding = 56;
                this.lineHeight = 40;
                this.font = "bold 30px sans-serif";
                this.text = "";
                this.textHeight = 0;
                this.visibleUntil = 0;
                this.isPlaying = false;

                this.el.setAttribute("material", "src", this.canvas);
                this.el.setAttribute("material", "transparent", true);
                this.el.setAttribute("material", "alphaTest", 0.01);
                this.draw();
            },

            updateText: function (newText) {
                this.text = escapeCanvasText(newText);
                this.lines = this.wrapText(this.text, this.canvas.width - this.padding * 2);
                this.textHeight = this.lines.length * this.lineHeight;
                this.scrollY = this.canvas.height + 20;
                this.isPlaying = false;
                this.draw();
            },

            play: function (newText) {
                this.updateText(newText);
                this.isPlaying = true;
                infoPanelRoot.setAttribute("visible", true);
                const scrollDurationMs = ((this.canvas.height + this.textHeight + 60) / this.scrollSpeed) * 1000;
                this.visibleUntil = performance.now() + scrollDurationMs + 4000;
            },

            hide: function () {
                this.isPlaying = false;
                this.visibleUntil = 0;
                infoPanelRoot.setAttribute("visible", false);
            },

            wrapText: function (text, maxWidth) {
                const ctx = this.ctx;
                ctx.font = this.font;

                const rawLines = text.split("\n");
                const output = [];

                rawLines.forEach(line => {
                    if (line.trim() === "") {
                        output.push("");
                        return;
                    }

                    let buffer = "";
                    for (const ch of line) {
                        const test = buffer + ch;
                        if (ctx.measureText(test).width > maxWidth && buffer !== "") {
                            output.push(buffer);
                            buffer = ch;
                        } else {
                            buffer = test;
                        }
                    }

                    if (buffer !== "") {
                        output.push(buffer);
                    }
                });

                return output;
            },

            tick: function (time) {
                const delta = Math.min((time - this.lastTime) / 1000, 0.05);
                this.lastTime = time;
                if (this.isPlaying) {
                    this.scrollY -= this.scrollSpeed * delta;
                    if (time >= this.visibleUntil) {
                        this.hide();
                        return;
                    }
                }

                this.draw();
            },

            draw: function () {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                ctx.clearRect(0, 0, w, h);

                const panelGrad = ctx.createLinearGradient(0, 0, 0, h);
                panelGrad.addColorStop(0, "rgba(12, 25, 42, 0.86)");
                panelGrad.addColorStop(1, "rgba(18, 53, 78, 0.72)");
                ctx.fillStyle = panelGrad;
                ctx.fillRect(0, 0, w, h);

                ctx.strokeStyle = "rgba(220, 240, 255, 0.60)";
                ctx.lineWidth = 6;
                ctx.strokeRect(10, 10, w - 20, h - 20);

                ctx.save();
                ctx.beginPath();
                ctx.rect(this.padding, 40, w - this.padding * 2, h - 80);
                ctx.clip();

                ctx.font = this.font;
                ctx.textAlign = "center";
                ctx.textBaseline = "top";

                let y = this.scrollY;
                for (let i = 0; i < this.lines.length; i++) {
                    ctx.fillStyle = "rgba(255,255,255,0.96)";
                    ctx.fillText(this.lines[i], w / 2, y);
                    y += this.lineHeight;
                }

                ctx.restore();

                const fadeTop = ctx.createLinearGradient(0, 0, 0, 72);
                fadeTop.addColorStop(0, "rgba(16, 38, 59, 1)");
                fadeTop.addColorStop(1, "rgba(16, 38, 59, 0)");
                ctx.fillStyle = fadeTop;
                ctx.fillRect(0, 0, w, 72);

                const fadeBottom = ctx.createLinearGradient(0, h - 72, 0, h);
                fadeBottom.addColorStop(0, "rgba(16, 38, 59, 0)");
                fadeBottom.addColorStop(1, "rgba(16, 38, 59, 1)");
                ctx.fillStyle = fadeBottom;
                ctx.fillRect(0, h - 72, w, 72);

                this.texture.needsUpdate = true;
            }
        });

        function getInfoPanelComponent() {
            const panel = document.getElementById("info-panel");
            return panel && panel.components ? panel.components["scrolling-info-panel"] : null;
        }

        function updateInfoPanelLanguage() {
            const panelComp = getInfoPanelComponent();
            if (panelComp) {
                panelComp.updateText(getCurrentDescription());
            }
        }

        function getCurrentDescription() {
            const modelDescriptions = descriptions[currentModelKey] || descriptions.all;
            return modelDescriptions[currentLang] || modelDescriptions.Japanese || "";
        }

        function showCurrentInfoPanel() {
            const panelComp = getInfoPanelComponent();
            if (panelComp) {
                panelComp.play(getCurrentDescription());
            }
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll(".top-center button").forEach(button => button.classList.remove("active-btn"));
            document.getElementById("lang-" + lang).classList.add("active-btn");
            showCurrentInfoPanel();
        }

        function switchModel(key) {
            currentModelKey = key;
            model.setAttribute("gltf-model", appData[key]);
            document.querySelectorAll(".left-menu button:not(.loc-btn):not(.audio-btn)").forEach(button => button.classList.remove("active-btn"));
            const btn = document.getElementById("m-" + key);
            if (btn) {
                btn.classList.add("active-btn");
            }
            showCurrentInfoPanel();
        }

        function adjustRotation(deg) {
            currentRotation += deg;
            model.setAttribute("rotation", `0 ${currentRotation} 0`);
        }

        function adjustScale(factor) {
            currentScale *= factor;
            contentRoot.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
        }

        function adjustHeight(delta) {
            currentHeight += delta;
            contentRoot.setAttribute("position", `0 ${currentHeight} 0`);
        }

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }

        function playAudio(key) {
            currentModelKey = key;
            stopAllAudio();
            const fileName = "audio/" + audioFiles[key] + currentLang + ".wav";
            currentAudio = new Audio(fileName);
            currentAudio.play().catch(() => {
                statusBar.innerText = "音声の再生に失敗しました。";
            });
            showCurrentInfoPanel();
        }

        function toggleUi() {
            uiVisible = !uiVisible;
            document.body.classList.toggle("ui-hidden", !uiVisible);
            uiToggleButton.textContent = uiVisible ? "UI OFF" : "UI ON";
        }

        function degreesToRadians(deg) {
            return deg * Math.PI / 180;
        }

        function radiansToDegrees(rad) {
            return rad * 180 / Math.PI;
        }

        function destinationPoint(lat, lon, bearingDeg, distanceMeters) {
            const radius = 6378137;
            const bearing = degreesToRadians(bearingDeg);
            const lat1 = degreesToRadians(lat);
            const lon1 = degreesToRadians(lon);
            const angularDistance = distanceMeters / radius;

            const lat2 = Math.asin(
                Math.sin(lat1) * Math.cos(angularDistance) +
                Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing)
            );

            const lon2 = lon1 + Math.atan2(
                Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
                Math.cos(angularDistance) - Math.sin(lat1) * Math.sin(lat2)
            );

            return {
                lat: radiansToDegrees(lat2),
                lon: radiansToDegrees(lon2)
            };
        }

        function requestOrientationPermissionIfNeeded() {
            if (orientationPermissionTried) {
                return;
            }

            orientationPermissionTried = true;

            const fn = DeviceOrientationEvent && DeviceOrientationEvent.requestPermission;
            if (typeof fn === "function") {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === "granted") {
                            updateStatus("方位センサーの使用を許可しました。");
                        } else {
                            updateStatus("方位センサー未許可のため、現在地配置は北方向基準になります。");
                        }
                    })
                    .catch(() => {
                        updateStatus("方位センサー許可に失敗しました。");
                    });
            }
        }

        function updateHeading(event) {
            if (typeof event.webkitCompassHeading === "number") {
                deviceHeading = event.webkitCompassHeading;
                return;
            }

            if (event.absolute === true && typeof event.alpha === "number") {
                deviceHeading = (360 - event.alpha + 360) % 360;
            }
        }

        window.addEventListener("deviceorientationabsolute", updateHeading, true);
        window.addEventListener("deviceorientation", updateHeading, true);

        function setAnchorLocation(type) {
            requestOrientationPermissionIfNeeded();

            let target = null;

            if (type === "current") {
                if (!userLoc) {
                    updateStatus("現在地がまだ取得できていません。");
                    return;
                }

                const bearing = typeof deviceHeading === "number" ? deviceHeading : 0;
                target = destinationPoint(userLoc.lat, userLoc.lon, bearing, 15);
            } else if (locations[type]) {
                target = locations[type];
            }

            if (!target) {
                return;
            }

            if (!model.getAttribute("gltf-model")) {
                switchModel("all");
            }

            if (type === "current") {
                if (typeof deviceHeading === "number") {
                    placeLockedAnchor(target, type, "現在地の前方15mに固定しました。建物はこの座標に固定されます。");
                } else {
                    placeLockedAnchor(target, type, "方位未取得のため、現在地の北側15mに固定しました。建物はこの座標に固定されます。");
                }
            } else {
                placeLockedAnchor(target, type, "指定地点に固定しました。建物はこの座標に固定されます。");
            }
        }

        navigator.geolocation.watchPosition(
            pos => {
                userLoc = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };

                if (statusBar.innerText === "GPSを取得中...") {
                    updateStatus("GPS OK。固定場所を選んでください。");
                }
            },
            err => {
                updateStatus("GPS取得に失敗しました: " + err.message);
            },
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 15000
            }
        );

        sceneEl.addEventListener("loaded", () => {
            updateInfoPanelLanguage();
            showCameraDiagnostics();
            explainCameraBlockedState();
        });

        cameraEl.addEventListener("gps-camera-update-position", event => {
            const accuracy = event.detail && event.detail.position ? event.detail.position.accuracy : null;
            if (typeof accuracy === "number" && accuracy > 50) {
                updateStatus(`GPS精度が低いです (${Math.round(accuracy)}m)。空が見える場所で再確認してください。`);
            }
        });

        sceneEl.addEventListener("camera-init", () => {
            updateStatus("カメラ映像を開始しました。");
        });

        sceneEl.addEventListener("camera-error", event => {
            const detail = event && event.detail ? JSON.stringify(event.detail) : "unknown";
            updateStatus(`カメラ開始に失敗しました: ${detail}`);
        });

        model.addEventListener("model-loaded", () => {
            if (lockedAnchorTarget) {
                placeLockedAnchor(
                    lockedAnchorTarget,
                    lockedAnchorType || "current",
                    "モデルを読み込みました。固定座標へ再配置しました。"
                );
            }
        });
    </script>
</body>
</html>
