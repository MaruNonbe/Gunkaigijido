<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文教の森 AR - 最終完全版</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        #ui-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        #ui-toggle { position: absolute; top: 10px; right: 10px; z-index: 120; pointer-events: auto; background: rgba(33, 33, 33, 0.88); color: white; padding: 8px; border-radius: 5px; border: 1px solid #fff; }
        .clickable { pointer-events: auto; }
        .ui-hidden .ui-group { display: none; }
        button { padding: 10px; border-radius: 8px; border: none; background: white; font-weight: bold; font-size: 11px; cursor: pointer; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4); color: #333; touch-action: manipulation; }
        .active-btn { background: #4caf50 !important; color: white; }
        .loc-btn { background: #2196f3; color: white; width: 100%; }
        .rotate-btn { background: #9c27b0 !important; color: white; flex: 1; }
        .narration-btn { background: #ff9800; color: white; min-width: 60px; }
        .label { color: white; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; margin-bottom: 2px; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 6px; }
        .top-center { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; width: 95%; justify-content: center; flex-wrap: wrap; }
        .left-menu { top: 60px; left: 10px; width: 210px; }
        .right-menu { top: 60px; right: 10px; align-items: flex-end; width: 130px; }
        .model-row { display: flex; gap: 4px; width: 100%; }
        .model-row > button:first-child { flex: 1; }
        #status-bar { position: absolute; bottom: 80px; width: 100%; text-align: center; color: #0f0; background: rgba(0, 0, 0, 0.45); font-size: 11px; padding: 4px 0; }
    </style>
</head>

<body class="ui-visible">
    <button id="ui-toggle" onclick="toggleUi()">UI OFF</button>

    <div id="ui-layer">
        <div class="top-center clickable ui-group">
            <button id="lang-Japanese" class="active-btn" onclick="setLang('Japanese')">日本語</button>
            <button id="lang-English" onclick="setLang('English')">English</button>
            <button id="lang-Chinese" onclick="setLang('Chinese')">中文</button>
            <button id="lang-Korean" onclick="setLang('Korean')">한국어</button>
            <div style="width:100%; display:flex; gap:5px; justify-content:center; margin-top:5px;">
                <button style="background:#3f51b5; color:white;" onclick="startGpsWatch(true)">GPS再取得</button>
            </div>
        </div>

        <div class="left-menu menu clickable ui-group">
            <div class="label">建物を固定する場所</div>
            <button id="btn-current" class="loc-btn" onclick="setAnchorLocation('current')">① 現在地の15m先</button>
            <button id="btn-tas" class="loc-btn" onclick="setAnchorLocation('tas')">② タスホテル</button>
            <button id="btn-office" class="loc-btn" onclick="setAnchorLocation('office')">③ 旧西置賜郡役所</button>

            <div class="label" style="margin-top:10px;">表示モデル / 音声解説</div>
            <button id="m-all" onclick="switchModel('all')">全体(all)</button>
            <div class="model-row"><button id="m-kozakura" onclick="switchModel('kozakura')">旧西置賜郡役所</button><button class="narration-btn" onclick="playNarrationAndShow('kozakura')">説明</button></div>
            <div class="model-row"><button id="m-1st" onclick="switchModel('1st')">初代議事堂</button><button class="narration-btn" onclick="playNarrationAndShow('1st')">説明</button></div>
            <div class="model-row"><button id="m-2nd" onclick="switchModel('2nd')">2代目議事堂</button><button class="narration-btn" onclick="playNarrationAndShow('2nd')">説明</button></div>
            <button onclick="stopAllAudio()" style="background:#607d8b; color:white; margin-top:4px;">音声停止</button>
        </div>

        <div class="right-menu menu clickable ui-group">
            <div class="label">建物を回転</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button class="rotate-btn" onclick="adjustRotation(-30)">左回</button>
                <button class="rotate-btn" onclick="adjustRotation(30)">右回</button>
            </div>
            <div class="label" style="margin-top:10px;">高度 / サイズ</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustHeight(0.5)">上昇</button><button style="flex:1" onclick="adjustHeight(-0.5)">下降</button>
            </div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustScale(1.2)">拡大</button><button style="flex:1" onclick="adjustScale(0.8)">縮小</button>
            </div>
            <button onclick="location.reload()" style="background:#f44336; color:white; margin-top:10px; width:100%;">再起動</button>
        </div>
        <div id="status-bar" class="ui-group">GPSを取得中...</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true; precision: high;" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-entity id="gps-anchor">
            <a-entity id="content-root" position="0 0 0" scale="0.8 0.8 0.8">
                <a-entity id="main-model" gltf-model="" rotation="0 0 0" frustum-culled="false"></a-entity>
            </a-entity>
        </a-entity>
        <a-camera id="camera" gps-new-camera="gpsMinDistance: 0; positionMinAccuracy: 1000;" look-controls="magicWindowTrackingEnabled: true; touchEnabled: false;" camera="near: 0.1; far: 100000"></a-camera>
    </a-scene>

    <script>
        const appData = { all: "all.glb", kozakura: "Gun.glb", "1st": "1st.glb", "2nd": "2nd.glb" };
        const audioFiles = { kozakura: "Kozakura_", "1st": "1st_NisiokitamaGunkai_", "2nd": "2nd_NishiokitamaGUnkai_" };
        const locations = { tas: { lat: 38.1068, lon: 140.04 }, office: { lat: 38.10134, lon: 140.04299 } };

        let userLoc = null, currentRotation = 0, currentHeight = 0, currentScale = 0.8, currentAudio = null, currentLang = "Japanese", currentModelKey = "all", deviceHeading = null, anchorPlaced = false;
        const gpsAnchor = document.getElementById("gps-anchor"), contentRoot = document.getElementById("content-root"), model = document.getElementById("main-model"), statusBar = document.getElementById("status-bar");

        function setLang(l) { currentLang = l; document.querySelectorAll(".top-center button").forEach(b => b.classList.toggle("active-btn", b.id.includes(l))); }
        function switchModel(k) { currentModelKey = k; model.setAttribute("gltf-model", appData[k]); document.querySelectorAll(".left-menu button[id^='m-']").forEach(b => b.classList.remove("active-btn")); const btn = document.getElementById("m-"+k); if(btn) btn.classList.add("active-btn"); }
        function adjustRotation(d) { currentRotation += d; model.setAttribute("rotation", `0 ${currentRotation} 0`); }
        function adjustScale(f) { currentScale *= f; contentRoot.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`); }
        function adjustHeight(d) { currentHeight += d; contentRoot.setAttribute("position", `0 ${currentHeight} 0`); }
        function stopAllAudio() { if (currentAudio) { currentAudio.pause(); currentAudio = null; } }
        function toggleUi() { document.body.classList.toggle("ui-hidden"); }

        function setAnchorLocation(type) {
            let target = null;
            if (type === 'current' && userLoc) {
                const bearing = deviceHeading || 0;
                target = { lat: userLoc.lat + 0.00015, lon: userLoc.lon };
            } else if (locations[type]) {
                target = locations[type];
            }

            if (target) {
                gpsAnchor.setAttribute("gps-new-entity-place", { latitude: target.lat, longitude: target.lon });
                statusBar.innerText = "固定完了。歩くと建物との距離が変わります。";
                anchorPlaced = true;
                if (!model.getAttribute("gltf-model")) switchModel("all");
            }
        }

        async function playNarrationAndShow(key) {
            switchModel(key); stopAllAudio();
            currentAudio = new Audio(`audio/${audioFiles[key]}${currentLang}.wav`);
            currentAudio.play().catch(() => statusBar.innerText = "音声エラー");
        }

        function startGpsWatch() {
            navigator.geolocation.watchPosition(pos => {
                userLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
                statusBar.innerText = "GPS OK。場所を選択してください。";
                if (!anchorPlaced && userLoc.accuracy <= 30) setAnchorLocation("current");
            }, err => {
                statusBar.innerText = "GPSエラー: " + err.message;
            }, { enableHighAccuracy: true });
        }

        window.addEventListener("deviceorientation", e => { deviceHeading = e.webkitCompassHeading || (360 - e.alpha); });
        document.addEventListener('click', () => { 
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        }, {once: true});

        window.onload = startGpsWatch;
    </script>
</body>
</html>
