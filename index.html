<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旧西置賜郡議事堂 AR Quick Look</title>
    <style>
        :root {
            --bg-top: #0b1624;
            --bg-bottom: #02060b;
            --panel: rgba(12, 24, 37, 0.9);
            --panel-border: rgba(194, 223, 255, 0.22);
            --text: #f3f7fb;
            --muted: #a7b7c8;
            --accent: #0ea5e9;
            --accent-2: #f97316;
            --accent-3: #10b981;
            --danger: #ef4444;
            --disabled: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:
                radial-gradient(circle at top, rgba(14, 165, 233, 0.18), transparent 34%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        .shell {
            width: min(1080px, calc(100vw - 24px));
            margin: 0 auto;
            padding: 18px 0 28px;
        }

        .topbar,
        .grid,
        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            margin-bottom: 14px;
        }

        .title {
            min-width: 220px;
        }

        .title h1 {
            margin: 0 0 4px;
            font-size: 20px;
        }

        .title p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button,
        .button-link {
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: #243344;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .ar-link {
            padding: 0;
            overflow: hidden;
        }

        button.active {
            background: var(--accent-3);
        }

        .primary {
            background: var(--accent);
        }

        .audio {
            background: var(--accent-2);
        }

        .warn {
            background: var(--danger);
        }

        .disabled {
            background: var(--disabled);
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            overflow: hidden;
        }

        .preview {
            min-height: 360px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background:
                linear-gradient(180deg, rgba(8, 16, 25, 0.55), rgba(8, 16, 25, 0.9)),
                radial-gradient(circle at center, rgba(14, 165, 233, 0.16), transparent 48%);
        }

        .eyebrow {
            color: #8bd7ff;
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        .preview h2 {
            margin: 10px 0 8px;
            line-height: 1.08;
            font-size: clamp(28px, 4vw, 48px);
        }

        .preview p {
            margin: 0;
            max-width: 46ch;
            color: var(--muted);
            line-height: 1.7;
        }

        .preview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        .chip {
            padding: 8px 12px;
            border: 1px solid rgba(159, 176, 193, 0.24);
            border-radius: 999px;
            color: #d8e5f2;
            font-size: 12px;
        }

        .controls {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .panel {
            padding: 14px;
        }

        .panel h3 {
            margin: 0 0 10px;
            color: #b8c7d8;
            font-size: 13px;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pair {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .status {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            color: #d6f2ff;
            background: rgba(2, 26, 42, 0.84);
            border: 1px solid rgba(14, 165, 233, 0.2);
            font-size: 12px;
        }

        .text-panel {
            margin-top: 14px;
            min-height: 140px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .hidden-ui .ui-group {
            display: none;
        }

        .ar-link img {
            display: block;
            width: 100%;
            height: 100%;
            min-width: 132px;
            min-height: 42px;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <div class="title">
                <h1>旧西置賜郡議事堂 AR</h1>
                <p>USDZ / Quick Look 版。iPhone・iPad の Safari で AR 表示します。</p>
            </div>
            <div class="button-row">
                <button id="lang-Japanese" class="active ui-group" type="button" onclick="setLang('Japanese')">日本語</button>
                <button id="lang-English" class="ui-group" type="button" onclick="setLang('English')">English</button>
                <button id="lang-Chinese" class="ui-group" type="button" onclick="setLang('Chinese')">中文</button>
                <button id="lang-Korean" class="ui-group" type="button" onclick="setLang('Korean')">한국어</button>
                <button id="ui-toggle" type="button" onclick="toggleUi()">UI OFF</button>
            </div>
        </div>

        <div class="grid">
            <section class="preview">
                <div>
                    <div class="eyebrow" id="model-label">MODEL</div>
                    <h2 id="hero-title">全体表示</h2>
                    <p id="hero-description">Apple Quick Look で USDZ を開いて AR 表示します。ブラウザ内 3D 表示ではありません。</p>
                    <div class="preview-meta">
                        <div class="chip" id="compatibility-chip">Quick Look Ready</div>
                        <div class="chip" id="anchor-chip">位置固定: Quick Look では未対応</div>
                        <div class="chip" id="transform-chip">回転・拡大縮小: Quick Look 側で操作</div>
                    </div>
                    <p id="file-path-note" style="margin-top:14px;font-size:12px;color:#cfe3f7;word-break:break-all;"></p>
                </div>
                <div class="button-row">
                    <a id="launch-ar-link" class="button-link primary ar-link" rel="ar" href="all.usdz" aria-label="ARを見る">
                        <img id="launch-ar-image" src="" alt="ARを見る">
                    </a>
                    <button class="audio" type="button" onclick="playAudio(currentModelKey)">音声再生</button>
                    <button type="button" onclick="stopAllAudio()">音声停止</button>
                </div>
            </section>

            <aside class="controls ui-group">
                <div class="panel">
                    <h3>表示モデル</h3>
                    <div class="stack">
                        <button id="m-all" class="active" type="button" onclick="switchModel('all')">全体表示</button>
                        <div class="pair">
                            <button id="m-kozakura" type="button" onclick="switchModel('kozakura')">旧西置賜郡役所</button>
                            <button class="audio" type="button" onclick="playAudio('kozakura')">音声</button>
                        </div>
                        <div class="pair">
                            <button id="m-1st" type="button" onclick="switchModel('1st')">初代議事堂</button>
                            <button class="audio" type="button" onclick="playAudio('1st')">音声</button>
                        </div>
                        <div class="pair">
                            <button id="m-2nd" type="button" onclick="switchModel('2nd')">二代目議事堂</button>
                            <button class="audio" type="button" onclick="playAudio('2nd')">音声</button>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>位置ボタン</h3>
                    <div class="stack">
                        <button id="btn-current" type="button" onclick="setAnchorLocation('current')">現在地の前方15m</button>
                        <button id="btn-tas" type="button" onclick="setAnchorLocation('tas')">TAS</button>
                        <button id="btn-office" type="button" onclick="setAnchorLocation('office')">旧役所位置</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>変形操作</h3>
                    <div class="stack">
                        <button class="disabled" type="button" onclick="showUnsupported('rotation')">回転</button>
                        <button class="disabled" type="button" onclick="showUnsupported('height')">高さ</button>
                        <button class="disabled" type="button" onclick="showUnsupported('scale')">サイズ</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>補助</h3>
                    <div class="stack">
                        <button type="button" onclick="showDiagnostics()">診断</button>
                        <button class="warn" type="button" onclick="location.reload()">再読み込み</button>
                    </div>
                </div>
            </aside>
        </div>

        <div id="text-panel" class="panel text-panel ui-group"></div>
        <div id="status-bar" class="status ui-group">Safari で「ARを見る」を直接タップすると Quick Look が起動します。</div>
    </div>

    <audio id="audio-player" preload="none"></audio>

    <script>
        const appData = {
            all: { label: "全体表示", usdz: "all.usdz", title: "全体表示" },
            kozakura: { label: "旧西置賜郡役所", usdz: "Gun.usdz", title: "旧西置賜郡役所" },
            "1st": { label: "初代議事堂", usdz: "1st.usdz", title: "初代議事堂" },
            "2nd": { label: "二代目議事堂", usdz: "2nd.usdz", title: "二代目議事堂" }
        };

        const audioFiles = {
            kozakura: "audio/Kozakura_",
            "1st": "audio/1st_NisiokitamaGunkai_",
            "2nd": "audio/2nd_NishiokitamaGUnkai_"
        };

        const descriptions = {
            all: {
                Japanese: "文教の森 AR\n\nこの版は Apple Quick Look を使います。USDZ モデルはページ内ではなく、システムの AR ビューアで表示されます。",
                English: "Bunkyo no Mori AR\n\nThis version uses Apple Quick Look. The USDZ model opens in the system AR viewer instead of rendering inside the page.",
                Chinese: "文教之森 AR\n\n此版本使用 Apple Quick Look。USDZ 模型会在系统 AR 检视器中打开，而不是在页面内渲染。",
                Korean: "문교의 숲 AR\n\n이 버전은 Apple Quick Look을 사용합니다. USDZ 모델은 페이지 내부가 아니라 시스템 AR 뷰어에서 열립니다."
            },
            kozakura: {
                Japanese: "旧西置賜郡役所\n\n明治11年建築。現在は小桜館として保存されています。",
                English: "Former Nishiokitama District Office\n\nBuilt in 1878 and preserved today as Kozakura-kan.",
                Chinese: "旧西置赐郡役所\n\n建于 1878 年，现保存为小樱馆。",
                Korean: "구 니시오키타마 군청\n\n1878년에 세워졌고 현재는 고자쿠라관으로 보존되어 있습니다."
            },
            "1st": {
                Japanese: "初代議事堂\n\n明治20年建築の木造洋風議事堂です。",
                English: "First Assembly Hall\n\nA Western-style wooden hall built in 1887.",
                Chinese: "初代议事堂\n\n建于 1887 年的木造西式议事堂。",
                Korean: "초대 의사당\n\n1887년에 지어진 서양식 목조 의사당입니다."
            },
            "2nd": {
                Japanese: "二代目議事堂\n\n1911年10月に新築された二代目の建物です。",
                English: "Second Assembly Hall\n\nThe second hall was newly built in October 1911.",
                Chinese: "第二代议事堂\n\n1911 年 10 月新建。",
                Korean: "2대 의사당\n\n1911년 10월에 새로 지어진 건물입니다."
            }
        };

        const locations = {
            current: "現在地の前方15m",
            tas: "TAS",
            office: "旧役所位置"
        };

        const textPanel = document.getElementById("text-panel");
        const statusBar = document.getElementById("status-bar");
        const heroTitle = document.getElementById("hero-title");
        const heroDescription = document.getElementById("hero-description");
        const modelLabel = document.getElementById("model-label");
        const launchArLink = document.getElementById("launch-ar-link");
        const launchArImage = document.getElementById("launch-ar-image");
        const audioPlayer = document.getElementById("audio-player");
        const compatibilityChip = document.getElementById("compatibility-chip");
        const anchorChip = document.getElementById("anchor-chip");
        const transformChip = document.getElementById("transform-chip");
        const filePathNote = document.getElementById("file-path-note");

        let currentLang = "Japanese";
        let currentModelKey = "all";
        let uiVisible = true;
        let selectedAnchor = "office";

        function setStatus(message) {
            statusBar.textContent = message;
        }

        function isIOSSafari() {
            const ua = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/.test(ua);
            const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
            return isIOS && isSafari;
        }

        function getCurrentDescription() {
            const group = descriptions[currentModelKey] || descriptions.all;
            return group[currentLang] || group.Japanese || "";
        }

        function makeArPoster(label) {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="264" height="84" viewBox="0 0 264 84">
                    <defs>
                        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                            <stop offset="0%" stop-color="#0ea5e9"/>
                            <stop offset="100%" stop-color="#0369a1"/>
                        </linearGradient>
                    </defs>
                    <rect width="264" height="84" rx="24" fill="url(#g)"/>
                    <text x="132" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">${label}</text>
                </svg>
            `;
            return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
        }

        function refreshView() {
            const model = appData[currentModelKey];
            const resolvedUrl = new URL(model.usdz, window.location.href).href;
            heroTitle.textContent = model.title;
            heroDescription.textContent = getCurrentDescription();
            modelLabel.textContent = model.label.toUpperCase();
            textPanel.textContent = getCurrentDescription();
            launchArLink.href = resolvedUrl;
            launchArImage.src = makeArPoster("ARを見る");
            compatibilityChip.textContent = isIOSSafari() ? "Quick Look Ready" : "iOS Safari Required";
            anchorChip.textContent = "位置指定: " + locations[selectedAnchor] + "（Quick Look には未連携）";
            transformChip.textContent = "回転・拡大縮小は Quick Look 側で操作";
            filePathNote.textContent = "USDZ: " + resolvedUrl;
        }

        function switchModel(key) {
            currentModelKey = key;
            document.querySelectorAll("button[id^='m-']").forEach((button) => button.classList.remove("active"));
            const button = document.getElementById("m-" + key);
            if (button) {
                button.classList.add("active");
            }
            refreshView();
            setStatus(appData[key].label + " の USDZ を選択しました。");
        }
        window.switchModel = switchModel;

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll("button[id^='lang-']").forEach((button) => button.classList.remove("active"));
            document.getElementById("lang-" + lang).classList.add("active");
            refreshView();
            setStatus("表示言語を切り替えました。");
        }
        window.setLang = setLang;

        function playAudio(key) {
            if (!audioFiles[key]) {
                setStatus("このモデルに対応する音声はありません。");
                return;
            }
            audioPlayer.src = audioFiles[key] + currentLang + ".wav";
            audioPlayer.play()
                .then(() => setStatus("音声を再生しています。"))
                .catch(() => setStatus("音声の再生に失敗しました。audio フォルダとファイル名を確認してください。"));
        }
        window.playAudio = playAudio;

        function stopAllAudio() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            setStatus("音声を停止しました。");
        }
        window.stopAllAudio = stopAllAudio;

        function setAnchorLocation(type) {
            selectedAnchor = type;
            document.querySelectorAll("button[id^='btn-']").forEach((button) => button.classList.remove("active"));
            document.getElementById("btn-" + type).classList.add("active");
            refreshView();
            setStatus(locations[type] + " を選択しました。Quick Look には位置情報を直接渡せません。");
        }
        window.setAnchorLocation = setAnchorLocation;

        function showUnsupported(kind) {
            const messages = {
                rotation: "回転はページ側では制御できません。Quick Look 起動後にユーザー操作で調整します。",
                height: "高さは Quick Look へ直接引き継げません。",
                scale: "サイズは Quick Look へ直接引き継げません。"
            };
            setStatus(messages[kind] || "この操作は Quick Look では未対応です。");
        }
        window.showUnsupported = showUnsupported;

        function showDiagnostics() {
            const info = {
                userAgent: navigator.userAgent,
                quickLookCapable: isIOSSafari(),
                model: currentModelKey,
                usdz: appData[currentModelKey].usdz,
                language: currentLang,
                anchorSelection: selectedAnchor
            };
            console.log("[quicklook-diagnostics]", info);
            setStatus("診断情報をコンソールへ出力しました。");
        }
        window.showDiagnostics = showDiagnostics;

        function toggleUi() {
            uiVisible = !uiVisible;
            document.body.classList.toggle("hidden-ui", !uiVisible);
            document.getElementById("ui-toggle").textContent = uiVisible ? "UI OFF" : "UI ON";
            setStatus(uiVisible ? "UI を表示しました。" : "UI を非表示にしました。");
        }
        window.toggleUi = toggleUi;

        setAnchorLocation("office");
        switchModel("all");
    </script>
</body>
</html>
