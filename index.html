<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR - 音声ガイド修正版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 8px; }
        button { padding: 10px; border-radius: 8px; border: none; background: white; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .active-btn { background: #4CAF50 !important; color: white; }
        .audio-btn { background: #FF9800; color: white; border: 1px solid #fff; width: 40px; }
        .label { color: white; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .left-menu { top: 10px; left: 10px; }
        .right-menu { top: 10px; right: 10px; align-items: flex-end; }
        .top-center { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; width: 90%; justify-content: center; flex-wrap: wrap; }
        #status-bar { position: absolute; bottom: 80px; width: 100%; text-align: center; color: #0f0; background: rgba(0,0,0,0.4); font-size: 11px; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="top-center clickable">
            <button id="lang-Japanese" class="active-btn" onclick="setLang('Japanese')">JP</button>
            <button id="lang-English" onclick="setLang('English')">EN</button>
            <button id="lang-Chinese" onclick="setLang('Chinese')">CN</button>
            <button id="lang-Korean" onclick="setLang('Korean')">KR</button>
        </div>

        <div class="left-menu menu clickable">
            <div class="label">建物選択 / 音声</div>
            <div style="display:flex; gap:5px;">
                <button id="m-gun" onclick="switchModel('kozakura')">小桜館</button>
                <button class="audio-btn" onclick="playAudio('kozakura')">🔊</button>
            </div>
            <div style="display:flex; gap:5px;">
                <button id="m-1st" onclick="switchModel('1st')">初代</button>
                <button class="audio-btn" onclick="playAudio('1st')">🔊</button>
            </div>
            <div style="display:flex; gap:5px;">
                <button id="m-2nd" onclick="switchModel('2nd')">二代目</button>
                <button class="audio-btn" onclick="playAudio('2nd')">🔊</button>
            </div>
            <button onclick="stopAllAudio()" style="background:#607D8B; color:white;">停止 ⏹</button>
        </div>

        <div class="right-menu menu clickable">
            <div class="label">サイズ</div>
            <button onclick="adjustScale(1.2)">拡大</button>
            <button onclick="adjustScale(0.8)">縮小</button>
            <div class="label" style="margin-top:5px;">高度</div>
            <button onclick="adjustHeight(0.5)">▲</button>
            <button onclick="adjustHeight(-0.5)">▼</button>
            <button onclick="location.reload()" style="background:#f44336; color:white; margin-top:5px;">再起動</button>
        </div>
        <div id="status-bar">音声待機中</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="ar-anchor" scale="1 1 1" position="0 0 0">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        <a-camera gps-camera="minDistance: 0.1; positionMinAccuracy: 1000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const appData = { kozakura: "Gun.glb", "1st": "1st.glb", "2nd": "2nd.glb" };
        
        // 画像のファイル名に厳密に合わせました
        const audioPath = "audio/"; // audioフォルダ内を参照
        const audioFiles = {
            kozakura: "Kozakura_",
            "1st": "1st_NisiokitamaGunkai_",
            "2nd": "2nd_NishiokitamaGUnkai_" // 画像の「GUnkai」という大文字小文字の揺れも再現
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');
        const statusBar = document.getElementById('status-bar');
        
        let currentLang = 'Japanese';
        let currentAudio = null;
        let currentHeight = 0;
        let currentScale = 1;

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.top-center button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('lang-' + lang).classList.add('active-btn');
            statusBar.innerText = "言語切替: " + lang;
        }

        function playAudio(key) {
            stopAllAudio();
            // 例: audio/Kozakura_Japanese.wav
            const fileName = audioPath + audioFiles[key] + currentLang + ".wav";
            currentAudio = new Audio(fileName);
            currentAudio.play().then(() => {
                statusBar.innerText = "再生中: " + fileName;
            }).catch(e => {
                statusBar.innerText = "再生エラー: ファイルが見つかりません";
                console.error(e);
            });
        }

        function stopAllAudio() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            statusBar.innerText = "停止中";
        }

        function switchModel(key) {
            model.setAttribute('gltf-model', appData[key]);
            document.querySelectorAll('.left-menu button').forEach(b => b.classList.remove('active-btn'));
            if(document.getElementById('m-'+key)) document.getElementById('m-'+key).classList.add('active-btn');
        }

        function adjustScale(f) { currentScale *= f; anchor.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`); }
        function adjustHeight(v) { currentHeight += v; anchor.setAttribute('position', `0 ${currentHeight} 0`); }

        navigator.geolocation.getCurrentPosition((pos) => {
            anchor.setAttribute('gps-entity-place', `latitude: ${pos.coords.latitude + 0.0001}; longitude: ${pos.coords.longitude};`);
            switchModel('kozakura');
        });
    </script>
</body>
</html>
