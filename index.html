<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR ログ解析版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 10px; border-radius: 8px; border: none; background: white; font-weight: bold; font-size: 12px; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 35%; left: 10px; }
        .ctrl-right { top: 35%; right: 10px; }
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        
        /* ログ解析パネル */
        #log-panel { 
            position: absolute; top: 10px; right: 10px; width: 240px; height: 160px; 
            background: rgba(0,0,0,0.85); color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0; line-height: 1.4;
        }
        .log-err { color: #ff4b4b; font-weight: bold; }
        .log-ok { color: #00ff00; }
        .log-info { color: #ffff00; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-panel">
            [FILE] <span id="log-file" class="log-info">---</span><br>
            [STATUS] <span id="log-status">待機中...</span><br>
            [POS] X:<span id="val-px">0</span> Y:<span id="val-py">0</span> Z:<span id="val-pz">0</span><br>
            [SCALE] <span id="val-sc">1.00</span><br>
            --------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button onclick="switchModel('all')">全体(all.glb)</button>
            <button onclick="switchModel('kozakura')">小桜館(Gun.glb)</button>
            <button onclick="switchModel('assembly1')">初代(1st.glb)</button>
            <button onclick="switchModel('assembly2')">二代目(2nd.glb)</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="moveModel('z', -1)">前へ</button>
            <button onclick="moveModel('z', 1)">後へ</button>
            <button onclick="moveModel('y', 1)">上へ (+Y)</button>
            <button onclick="moveModel('y', -1)">下へ (-Y)</button>
        </div>

        <div class="menu ctrl-right clickable">
            <button onclick="rotateModel(30)">回転</button>
            <button onclick="scaleModel(2)">拡大(x2)</button>
            <button onclick="scaleModel(0.5)">縮小(x0.5)</button>
            <button onclick="resetPos()" style="background:#ff9800; color:white;">リセット</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#f44336; color:white;">再読込</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="ar-anchor" position="0 -1.6 -5" scale="1 1 1">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // GitHubの構成に基づいた最新のファイル名設定
        const appData = {
            all: "all.glb",
            kozakura: "Gun.glb",
            assembly1: "1st.glb",
            assembly2: "2nd.glb"
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function addHistory(msg, isErr = false) {
            const hist = document.getElementById('log-history');
            const colorClass = isErr ? 'log-err' : '';
            hist.innerHTML = `<span class="${colorClass}">> ${msg}</span><br>` + hist.innerHTML;
        }

        function switchModel(key) {
            const fileName = appData[key];
            document.getElementById('log-file').innerText = fileName;
            document.getElementById('log-status').innerText = "読込中...";
            document.getElementById('log-status').className = "log-info";
            
            // 重要：一度モデルをクリアしてから再読込（読み込みエラーを防ぐ）
            model.removeAttribute('gltf-model');
            model.setAttribute('gltf-model', fileName);
            
            addHistory(`${key} の読込を開始しました`);
        }

        // モデル読込完了時のイベント
        model.addEventListener('model-loaded', () => {
            document.getElementById('log-status').innerText = "成功！表示中";
            document.getElementById('log-status').className = "log-ok";
            addHistory("3Dデータの展開に成功しました");
        });

        // モデル読込失敗時のイベント（ここで404エラーなどをキャッチ）
        model.addEventListener('model-error', (e) => {
            document.getElementById('log-status').innerText = "失敗 (404 / 読込不可)";
            document.getElementById('log-status').className = "log-err";
            addHistory("ファイルが見つからないか壊れています", true);
        });

        // 座標情報のリアルタイム更新
        function updateDisplay() {
            const pos = anchor.getAttribute('position');
            const sc = anchor.getAttribute('scale');
            document.getElementById('val-px').innerText = pos.x.toFixed(1);
            document.getElementById('val-py').innerText = pos.y.toFixed(1);
            document.getElementById('val-pz').innerText = pos.z.toFixed(1);
            document.getElementById('val-sc').innerText = sc.x.toFixed(2);
        }

        function moveModel(axis, val) {
            let p = anchor.getAttribute('position');
            p[axis] += val;
            anchor.setAttribute('position', p);
            updateDisplay();
        }

        function rotateModel(deg) {
            let r = anchor.getAttribute('rotation');
            r.y += deg;
            anchor.setAttribute('rotation', r);
            addHistory(`回転: ${r.y}度`);
        }

        function scaleModel(f) {
            let s = anchor.getAttribute('scale');
            s.x *= f; s.y *= f; s.z *= f;
            anchor.setAttribute('scale', s);
            updateDisplay();
            addHistory(`倍率: x${f}`);
        }

        function resetPos() {
            anchor.setAttribute('position', '0 -1.6 -5');
            anchor.setAttribute('scale', '1 1 1');
            updateDisplay();
            addHistory("位置を初期化しました");
        }
        
        updateDisplay();
    </script>
</body>
</html>
