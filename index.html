<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR - GPS固定・ウォークスルー版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; font-size: 13px; cursor: pointer; }
        .active-btn { background: #4CAF50 !important; color: white; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 30%; left: 10px; }
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        
        #log-panel { 
            position: absolute; top: 10px; right: 10px; width: 240px; height: 160px; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-panel">
            [FILE] <span id="log-file" style="color:cyan">---</span><br>
            [STATUS] <span id="log-status">GPS待機中</span><br>
            [LAT] <span id="val-lat" style="color:#ff0">---</span><br>
            [LON] <span id="val-lon" style="color:#ff0">---</span><br>
            [H-ADJ] <span id="val-py" style="color:#ff0">0</span>m<br>
            --------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button id="btn-tas" onclick="switchGPS('tas')">タスパークホテル(現在地)</button>
            <button id="btn-kozakura" onclick="switchGPS('kozakura')">小桜館(現地)</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="moveHeight(1)">建物を高く (+1m)</button>
            <button onclick="moveHeight(-1)">建物を低く (-1m)</button>
            <button onclick="rotateModel(45)">建物を回転 (45度)</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#f44336; color:white;">再起動・位置更新</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        <a-entity id="ar-anchor" scale="50 50 50">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        
        <a-camera gps-camera rotation-reader near="0.1" far="10000"></a-camera>
    </a-scene>

    <script>
        const locations = {
            tas: { lat: 38.101458, lon: 140.043358, file: "all.glb", name: "タスパークホテル" },
            kozakura: { lat: 38.110945, lon: 140.036323, file: "Gun.glb", name: "小桜館" }
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function addHistory(msg) {
            const hist = document.getElementById('log-history');
            hist.innerHTML = "> " + msg + "<br>" + hist.innerHTML;
        }

        function switchGPS(key) {
            const loc = locations[key];
            
            // ログ更新
            document.getElementById('log-file').innerText = loc.file;
            document.getElementById('val-lat').innerText = loc.lat;
            document.getElementById('val-lon').innerText = loc.lon;
            document.getElementById('log-status').innerText = "位置設定中...";

            // GPS座標の設定
            anchor.setAttribute('gps-entity-place', `latitude: ${loc.lat}; longitude: ${loc.lon};`);
            
            // モデルの読み込み
            model.setAttribute('gltf-model', loc.file);
            
            // UIのアクティブ表示
            document.querySelectorAll('.top-left button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + key).classList.add('active-btn');
            
            addHistory(loc.name + " に固定しました");
        }

        model.addEventListener('model-loaded', () => {
            document.getElementById('log-status').innerText = "表示成功";
            addHistory("3Dモデルを展開しました");
        });

        // 高さ（浮き沈み）の調整
        function moveHeight(val) {
            let p = anchor.getAttribute('position') || {x:0, y:0, z:0};
            p.y += val;
            anchor.setAttribute('position', p);
            document.getElementById('val-py').innerText = p.y.toFixed(1);
        }

        function rotateModel(deg) {
            let r = anchor.getAttribute('rotation') || {x:0, y:0, z:0};
            r.y += deg;
            anchor.setAttribute('rotation', r);
        }

        // 起動時にタスパークホテル側にセット
        window.onload = () => { addHistory("GPS取得を開始します..."); };
    </script>
</body>
</html>
