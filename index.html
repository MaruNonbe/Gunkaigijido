<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS解析デバッグ - 文教の森AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        
        /* 解析ログパネル */
        #analysis-panel { 
            position: absolute; top: 10px; left: 10px; width: 90%; 
            background: rgba(0,0,0,0.85); color: #0f0; padding: 10px; font-size: 11px; border: 1px solid #0f0;
        }
        .val { color: #ffeb3b; font-weight: bold; }
        .move-alert { color: #f00; font-size: 18px; font-weight: bold; display: none; }

        /* 操作ボタン */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px; border-radius: 8px; border: none; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="analysis-panel">
            [1. 生GPSデータ (Device Raw)]<br>
            LAT: <span id="raw-lat" class="val">---</span> / LON: <span id="raw-lon" class="val">---</span><br>
            精度: ±<span id="raw-acc" class="val">---</span>m<br>
            <br>
            [2. アプリ計算用座標 (AR Anchor)]<br>
            LAT: <span id="ar-lat" class="val">---</span> / LON: <span id="ar-lon" class="val">---</span><br>
            建物までの距離: <span id="ar-dist" class="val">---</span>m<br>
            <br>
            [3. 診断結果] <span id="move-status">静止中</span> <span id="move-alert" class="move-alert">!! MOVING !!</span>
        </div>

        <div class="controls clickable">
            <button onclick="downloadLog()">📊 ログを保存</button>
            <button onclick="switchModel('all')">全体(all)</button>
            <button onclick="location.reload()" style="background:#f44336; color:white;">再起動</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        <a-entity id="ar-anchor" scale="1 1 1">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        <a-camera gps-camera="minDistance: 0.1; positionMinAccuracy: 1000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const appData = { all: "all.glb", kozakura: "Gun.glb" };
        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');
        let targetLoc = null;
        let eventLogs = [];

        // GPS監視とログ記録
        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const acc = pos.coords.accuracy;

            // 生データの表示
            document.getElementById('raw-lat').innerText = lat.toFixed(7);
            document.getElementById('raw-lon').innerText = lon.toFixed(7);
            document.getElementById('raw-acc').innerText = Math.round(acc);

            // 初回配置
            if (!targetLoc) {
                targetLoc = { lat: lat + 0.00015, lon: lon }; 
                anchor.setAttribute('gps-entity-place', `latitude: ${targetLoc.lat}; longitude: ${targetLoc.lon};`);
                model.setAttribute('gltf-model', appData.all);
                document.getElementById('ar-lat').innerText = targetLoc.lat.toFixed(7);
                document.getElementById('ar-lon').innerText = targetLoc.lon.toFixed(7);
            }

            // 移動診断
            if (acc < 20) { // 精度が良い場合のみ
                document.getElementById('move-status').innerText = "正常に追跡中";
                document.getElementById('move-alert').style.display = "inline";
                setTimeout(() => { document.getElementById('move-alert').style.display = "none"; }, 500);
            }

            // ログ配列へ追加
            const timestamp = new Date().toLocaleTimeString();
            eventLogs.push(`${timestamp}, RawLat:${lat}, RawLon:${lon}, Acc:${acc}, TargetLat:${targetLoc.lat}`);

        }, (err) => {
            document.getElementById('move-status').innerText = "GPSエラー: " + err.message;
        }, { enableHighAccuracy: true, maximumAge: 0 });

        // AR.jsからの距離更新イベント
        window.addEventListener('gps-camera-update-position', (e) => {
            document.getElementById('ar-dist').innerText = e.detail.distance.toFixed(2);
        });

        // ログをテキストファイルとしてダウンロード
        function downloadLog() {
            const blob = new Blob([eventLogs.join('\n')], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AR_GPS_LOG_${new Date().getTime()}.txt`;
            a.click();
        }

        function switchModel(key) { model.setAttribute('gltf-model', appData[key]); }
    </script>
</body>
</html>
