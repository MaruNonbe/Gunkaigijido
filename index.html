<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR ログ保存版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background: #000; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 10px; border-radius: 5px; border: none; background: #eee; font-weight: bold; font-size: 11px; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 30%; left: 10px; }
        .ctrl-right { top: 30%; right: 10px; }
        .bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; }
        
        /* ログパネル */
        #log-panel { 
            position: absolute; top: 10px; right: 10px; width: 240px; height: 180px; 
            background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 10px; 
            border: 1px solid #0f0; overflow-y: auto; pointer-events: none;
        }
        .val { color: #ff0; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="log-panel">
            [FILE] <span id="log-file" class="val">---</span><br>
            [STATUS] <span id="log-status" class="val">起動中</span><br>
            [POS] X:<span id="log-px" class="val">0</span> Y:<span id="log-py" class="val">0</span> Z:<span id="log-pz" class="val">0</span><br>
            [ROT] Y:<span id="log-ry" class="val">0</span>度<br>
            [SCALE] <span id="log-sc" class="val">1.0</span><br>
            --------------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button onclick="switchModel('all')">全体</button>
            <button onclick="switchModel('kozakura')">小桜館</button>
            <button onclick="switchModel('assembly1')">初代</button>
            <button onclick="switchModel('assembly2')">二代目</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="move('z', -1)">前へ(-Z)</button>
            <button onclick="move('z', 1)">後へ(+Z)</button>
            <button onclick="move('y', 1)">上へ(+Y)</button>
            <button onclick="move('y', -1)">下へ(-Y)</button>
            <button onclick="move('x', -1)">左へ(-X)</button>
            <button onclick="move('x', 1)">右へ(+X)</button>
        </div>

        <div class="menu ctrl-right clickable">
            <button onclick="rotate(30)">右回転</button>
            <button onclick="rotate(-30)">左回転</button>
            <button onclick="scale(2)">拡大(x2)</button>
            <button onclick="scale(0.5)">縮小(x0.5)</button>
            <button onclick="resetAll()" style="background:#ff9800;">リセット</button>
        </div>

        <div class="bottom clickable">
            <button onclick="downloadLog()" style="background:#4CAF50; color:white;">💾 ログを保存</button>
            <button onclick="location.reload()" style="background:#f44336; color:white;">🔄 再起動</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="anchor" position="0 -1.6 -5" scale="1 1 1" rotation="0 0 0">
            <a-entity id="main-model" gltf-model="all.glb"></a-entity>
        </a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
const appData = {
            all: "all.glb",
            kozakura: "Gun.glb",        // ← GitHubの「Gun.glb」に合わせました
            assembly1: "1st.glb",
            assembly2: "2nd.glb"
        };

        let logData = []; // 保存用ログ配列
        const anchor = document.getElementById('anchor');
        const model = document.getElementById('main-model');

        // ログを画面と配列に記録
        function recordLog(msg) {
            const now = new Date().toLocaleTimeString();
            const pos = anchor.getAttribute('position');
            const rot = anchor.getAttribute('rotation');
            const sc = anchor.getAttribute('scale');
            
            // 画面表示更新
            document.getElementById('log-px').innerText = pos.x.toFixed(2);
            document.getElementById('log-py').innerText = pos.y.toFixed(2);
            document.getElementById('log-pz').innerText = pos.z.toFixed(2);
            document.getElementById('log-ry').innerText = rot.y.toFixed(0);
            document.getElementById('log-sc').innerText = sc.x.toFixed(2);
            
            const fullMsg = `[${now}] ${msg} | P(${pos.x.toFixed(1)},${pos.y.toFixed(1)},${pos.z.toFixed(1)}) S:${sc.x.toFixed(2)}`;
            const history = document.getElementById('log-history');
            history.innerHTML = fullMsg + "<br>" + history.innerHTML;
            
            logData.push(fullMsg); // 保存用に蓄積
        }

        function switchModel(key) {
            const file = appData[key];
            document.getElementById('log-file').innerText = file;
            document.getElementById('log-status').innerText = "読込中...";
            model.setAttribute('gltf-model', file);
            recordLog("モデル切替: " + key);
        }

        function move(ax, v) { 
            let p = anchor.getAttribute('position'); p[ax] += v; 
            anchor.setAttribute('position', p); recordLog("移動: " + ax); 
        }
        function rotate(d) { 
            let r = anchor.getAttribute('rotation'); r.y += d; 
            anchor.setAttribute('rotation', r); recordLog("回転"); 
        }
        function scale(f) { 
            let s = anchor.getAttribute('scale'); s.x *= f; s.y *= f; s.z *= f; 
            anchor.setAttribute('scale', s); recordLog("倍率"); 
        }
        function resetAll() { 
            anchor.setAttribute('position', '0 -1.6 -5'); 
            anchor.setAttribute('scale', '1 1 1'); 
            anchor.setAttribute('rotation', '0 0 0');
            recordLog("リセット実行"); 
        }

        model.addEventListener('model-loaded', () => {
            document.getElementById('log-status').innerText = "成功！";
            recordLog("読込完了");
        });

        model.addEventListener('model-error', () => {
            document.getElementById('log-status').innerText = "失敗(404等)";
            recordLog("エラー発生");
        });

        // ログをテキストファイルとしてダウンロード
        function downloadLog() {
            const blob = new Blob([logData.join('\n')], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `AR_LOG_${new Date().getTime()}.txt`;
            a.click();
        }
    </script>
</body>
</html>
