<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 ARポータル - 最終調整版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; font-size: 13px; cursor: pointer; }
        .active-btn { background: #4CAF50 !important; color: white; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 35%; left: 10px; }
        .ctrl-right { top: 35%; right: 10px; }
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        
        /* 解析ログパネル */
        #log-panel { 
            position: absolute; top: 10px; right: 10px; width: 220px; height: 140px; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0;
        }
        .log-val { color: #ff0; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-panel">
            [FILE] <span id="log-file" style="color:cyan">---</span><br>
            [STATUS] <span id="log-status">待機中</span><br>
            [POS] X:<span id="val-px" class="log-val">0</span> Y:<span id="val-py" class="log-val">0</span> Z:<span id="val-pz" class="log-val">0</span><br>
            [SCALE] <span id="val-sc" class="log-val">1.00</span><br>
            --------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button id="btn-all" onclick="switchModel('all')">全体(all)</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館(Gun)</button>
            <button id="btn-assembly1" onclick="switchModel('assembly1')">初代(1st)</button>
            <button id="btn-assembly2" onclick="switchModel('assembly2')">二代目(2nd)</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="moveModel('z', -1)">前へ</button>
            <button onclick="moveModel('z', 1)">後へ</button>
            <button onclick="moveModel('y', 1)">上へ(+Y)</button>
            <button onclick="moveModel('y', -1)">下へ(-Y)</button>
        </div>

        <div class="menu ctrl-right clickable">
            <button onclick="rotateModel(30)">回転</button>
            <button onclick="scaleModel(1.5)">拡大</button>
            <button onclick="scaleModel(0.7)">縮小</button>
            <button onclick="resetCurrentPos()" style="background:#ff9800; color:white;">位置リセット</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#f44336; color:white;">再読込</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="ar-anchor" position="0 -1.6 -5" scale="1 1 1">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // GitHubのファイル構成に基づく設定
        const appData = {
            all: { file: "all.glb", pos: "0 -5 -15", scale: "0.1 0.1 0.1" },
            kozakura: { file: "Gun.glb", pos: "0 -1.6 -5", scale: "1 1 1" },
            assembly1: { file: "1st.glb", pos: "0 -1.6 -8", scale: "1 1 1" },
            assembly2: { file: "2nd.glb", pos: "0 2 -5", scale: "0.5 0.5 0.5" }
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function addHistory(msg) {
            const hist = document.getElementById('log-history');
            hist.innerHTML = "> " + msg + "<br>" + hist.innerHTML;
        }

        function switchModel(key) {
            const data = appData[key];
            document.getElementById('log-file').innerText = data.file;
            document.getElementById('log-status').innerText = "読込中...";
            
            // モデルのパス設定
            model.setAttribute('gltf-model', data.file);
            
            // 建物ごとの個別座標・倍率を適用（ここが重要！）
            anchor.setAttribute('position', data.pos);
            anchor.setAttribute('scale', data.scale);
            
            // UI更新
            document.querySelectorAll('.top-left button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + key).classList.add('active-btn');
            
            updateDisplay();
            addHistory(key + " を呼び出しました");
        }

        model.addEventListener('model-loaded', () => {
            document.getElementById('log-status').innerText = "成功！表示中";
            addHistory("表示に成功しました");
        });

        model.addEventListener('model-error', () => {
            document.getElementById('log-status').innerText = "失敗(404)";
            addHistory("ファイルが見つかりません");
        });

        function updateDisplay() {
            const pos = anchor.getAttribute('position');
            const sc = anchor.getAttribute('scale');
            document.getElementById('val-px').innerText = pos.x.toFixed(1);
            document.getElementById('val-py').innerText = pos.y.toFixed(1);
            document.getElementById('val-pz').innerText = pos.z.toFixed(1);
            document.getElementById('val-sc').innerText = sc.x.toFixed(2);
        }

        function moveModel(axis, val) {
            let p = anchor.getAttribute('position');
            p[axis] += val;
            anchor.setAttribute('position', p);
            updateDisplay();
        }

        function rotateModel(deg) {
            let r = anchor.getAttribute('rotation');
            r.y += deg;
            anchor.setAttribute('rotation', r);
        }

        function scaleModel(f) {
            let s = anchor.getAttribute('scale');
            s.x *= f; s.y *= f; s.z *= f;
            anchor.setAttribute('scale', s);
            updateDisplay();
        }

        function resetCurrentPos() {
            // 現在選択中の建物の初期値に戻す
            const currentKey = document.querySelector('.active-btn').id.replace('btn-','');
            anchor.setAttribute('position', appData[currentKey].pos);
            anchor.setAttribute('scale', appData[currentKey].scale);
            updateDisplay();
            addHistory("位置を初期化しました");
        }

        // 初期起動時は「全体」を表示
        window.onload = () => { switchModel('all'); };
    </script>
</body>
</html>
