<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR - 外観パース調整版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }

        button { padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 13px; }
        .active-btn { background: #4CAF50 !important; color: white; }
        .label { color: white; font-size: 11px; margin-bottom: 4px; text-shadow: 1px 1px 2px black; font-weight: bold; }

        .left-menu { position: absolute; top: 80px; left: 10px; display: flex; flex-direction: column; gap: 10px; }
        .right-menu { position: absolute; top: 80px; right: 10px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .top-center { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; }
        .bottom-bar { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .btn-round { width: 55px; height: 55px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.95); }

        #desc-panel { position: absolute; bottom: 0; width: 100%; height: 20%; background: rgba(0,0,0,0.9); color: white; border-radius: 20px 20px 0 0; display: none; padding: 20px; box-sizing: border-box; border-top: 2px solid #4CAF50; }
        #log-status { position: absolute; top: 60px; width: 100%; text-align: center; color: #0f0; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px black; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="top-center clickable">
            <button onclick="changeLang('jp')">JP</button>
            <button onclick="changeLang('zh')">CN</button>
            <button onclick="changeLang('ko')">KO</button>
            <button onclick="changeLang('en')">EN</button>
        </div>

        <div id="log-status">GPS信号待機中...</div>

        <div class="left-menu clickable">
            <div class="label">建物を表示</div>
            <button id="btn-all" onclick="switchModel('all')">全体像 (20m先)</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館</button>
            <button id="btn-1st" onclick="switchModel('assembly1')">初代議事堂</button>
            <button id="btn-2nd" onclick="switchModel('assembly2')">二代目議事堂</button>
        </div>

        <div class="right-menu clickable">
            <div class="label">配置場所を固定</div>
            <button id="gps-tas" onclick="setGPS('tas')">タス(現在地)</button>
            <button id="gps-genchi" onclick="setGPS('genchi')">現地(小桜館)</button>
            
            <div class="label" style="margin-top:15px;">高さ・回転</div>
            <button onclick="adjust('y', 2)">上げる (+2m)</button>
            <button onclick="adjust('y', -2)">下げる (-2m)</button>
            <button onclick="rotate(30)">30度回転</button>
            <button onclick="location.reload()" style="background:#f44336; color:white;">リセット</button>
        </div>

        <div class="bottom-bar clickable">
            <button class="btn-round" onclick="alert('カメラでスクリーンショットを撮ってください')">📸</button>
            <button class="btn-round" onclick="shareSNS()">🔗</button>
            <button class="btn-round" onclick="toggleInfo()">ℹ️</button>
        </div>

        <div id="desc-panel" class="clickable">
            <h3 id="info-title" style="margin:0; font-size: 18px; color:#4CAF50;">建物情報</h3>
            <p id="info-text" style="font-size: 14px; margin-top:8px; line-height: 1.5;">読込中...</p>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        <a-entity id="ar-anchor" position="0 -2 0" scale="50 50 50">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        
        <a-camera gps-camera="minDistance: 1; positionMinAccuracy: 50;" rotation-reader near="0.1" far="10000"></a-camera>
    </a-scene>

    <script>
        const appData = {
            all: { file: "all.glb", jp: { title: "文教の森 全体像", text: "20m前方に配置しました。巨大なため、離れてご覧ください。" }, en: { title: "Full View", text: "Placed 20m ahead. Please watch from a distance." }, zh: { title: "全景", text: "放置在前方20米处。由于很大，请在远处观看。" }, ko: { title: "전체 모습", text: "20m 전방에 배치했습니다. 매우 크기 때문에 거리를 두고 봐 주세요." } },
            kozakura: { file: "Gun.glb", jp: { title: "旧西置賜郡役所 (小桜館)", text: "1878年築。最古の郡役所建築です。" }, en: { title: "Former District Office", text: "Built in 1878." }, zh: { title: "旧郡公署", text: "建于1878年。" }, ko: { title: "구 군청", text: "1878년 완공." } },
            assembly1: { file: "1st.glb", jp: { title: "初代郡会議事堂", text: "明治20年築の洋風木造建築。" }, en: { title: "1st Assembly Hall", text: "Built in 1887." }, zh: { title: "第一代议事堂", text: "建于1887年。" }, ko: { title: "초대 의사당", text: "1887년 완공." } },
            assembly2: { file: "2nd.glb", jp: { title: "二代目郡会議事堂", text: "明治44年に新築された二代目の議事堂。" }, en: { title: "2nd Assembly Hall", text: "Built in 1911." }, zh: { title: "第二代议事堂", text: "建于1911年。" }, ko: { title: "2대 의사당", text: "1911년 완공." } }
        };

        const gpsData = {
            tas: { lat: 38.101458, lon: 140.043358 },
            genchi: { lat: 38.110945, lon: 140.036323 }
        };

        let currentMode = "all";
        let currentLang = "jp";
        let isFixed = false;

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function setGPS(key) {
            const loc = gpsData[key];
            // 緯度を 0.00018（約20m）プラスして北側に遠ざける
            anchor.setAttribute('gps-entity-place', `latitude: ${loc.lat + 0.00018}; longitude: ${loc.lon};`);
            
            document.querySelectorAll('.right-menu button[id^="gps-"]').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('gps-' + key).classList.add('active-btn');
            document.getElementById('log-status').innerText = "20m先に配置。歩いて近づけます。";
        }

        function switchModel(key) {
            currentMode = key;
            model.setAttribute('gltf-model', appData[key].file);
            
            if(!isFixed) {
                setGPS('tas'); 
                isFixed = true;
            }

            document.querySelectorAll('.left-menu button').forEach(b => b.classList.remove('active-btn'));
            const btnId = (key === 'assembly1' ? 'btn-1st' : key === 'assembly2' ? 'btn-2nd' : 'btn-' + key);
            document.getElementById(btnId).classList.add('active-btn');
            updateUI();
        }

        function updateUI() {
            const d = appData[currentMode][currentLang];
            document.getElementById('info-title').innerText = d.title;
            document.getElementById('info-text').innerText = d.text;
        }

        function changeLang(l) { currentLang = l; updateUI(); }
        function toggleInfo() { const p = document.getElementById('desc-panel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
        
        function adjust(ax, v) { 
            let p = anchor.getAttribute('position') || {x:0, y:-2, z:0}; 
            p[ax] += v; 
            anchor.setAttribute('position', p); 
        }
        function rotate(deg) { 
            let r = anchor.getAttribute('rotation') || {x:0, y:0, z:0}; 
            r.y += deg; 
            anchor.setAttribute('rotation', r); 
        }

        function shareSNS() {
            const text = encodeURIComponent("文教の森ARで巨大な郡役所を体験中！ #長井市 #AR");
            window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
        }

        window.onload = () => { 
            setTimeout(() => { switchModel('all'); }, 1500); 
        };
    </script>
</body>
</html>
