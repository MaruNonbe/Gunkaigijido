<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文教の森 AR - LocAR版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #000;
            touch-action: none;
        }

        #render-root {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        #ui-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 120;
            pointer-events: auto;
            background: rgba(33, 33, 33, 0.88);
            color: white;
        }

        .clickable {
            pointer-events: auto;
        }

        .ui-group {
            pointer-events: auto;
        }

        .ui-hidden .ui-group {
            display: none;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            color: #333;
            touch-action: manipulation;
        }

        .active-btn {
            background: #4caf50 !important;
            color: white;
        }

        .loc-btn {
            background: #2196f3;
            color: white;
            width: 100%;
        }

        .rotate-btn {
            background: #9c27b0 !important;
            color: white;
            flex: 1;
        }

        .label {
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 2px;
        }

        .menu {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .top-center {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            width: 96%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diag-row {
            width: 100%;
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .left-menu {
            top: 76px;
            left: 10px;
            width: 180px;
        }

        .right-menu {
            top: 76px;
            right: 10px;
            align-items: flex-end;
            width: 130px;
        }

        .model-row {
            display: flex;
            gap: 4px;
            width: 100%;
        }

        .model-row > button:first-child {
            flex: 1;
        }

        #status-bar {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 20px);
            max-width: 720px;
            text-align: center;
            color: #0f0;
            background: rgba(0, 0, 0, 0.56);
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 10px;
        }

        #text-panel {
            position: absolute;
            left: 50%;
            bottom: 68px;
            transform: translateX(-50%);
            width: min(92vw, 560px);
            height: 130px;
            background: rgba(16, 38, 59, 0.82);
            border: 2px solid rgba(220, 240, 255, 0.55);
            border-radius: 14px;
            overflow: hidden;
            color: white;
            display: none;
            pointer-events: none;
        }

        #text-panel.show {
            display: block;
        }

        #text-scroll {
            position: absolute;
            left: 50%;
            width: calc(100% - 36px);
            transform: translateX(-50%);
            text-align: center;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
        }
    </style>
</head>
<body>
    <div id="render-root"></div>

    <button id="ui-toggle" onclick="toggleUi()">UI OFF</button>

    <div id="ui-layer">
        <div class="top-center clickable ui-group">
            <button id="lang-Japanese" class="active-btn" onclick="setLang('Japanese')">日本語</button>
            <button id="lang-English" onclick="setLang('English')">English</button>
            <button id="lang-Chinese" onclick="setLang('Chinese')">中文</button>
            <button id="lang-Korean" onclick="setLang('Korean')">한국어</button>
            <div class="diag-row">
                <button style="background:#e91e63; color:white;" onclick="startAr()">AR開始</button>
                <button style="background:#3f51b5; color:white;" onclick="showDiagnostics()">診断</button>
            </div>
        </div>

        <div class="left-menu menu clickable ui-group">
            <div class="label">建物を固定する場所</div>
            <button id="btn-current" class="loc-btn" onclick="setAnchorLocation('current')">① 現在地の15m先</button>
            <button id="btn-tas" class="loc-btn" onclick="setAnchorLocation('tas')">② タスホテル</button>
            <button id="btn-office" class="loc-btn" onclick="setAnchorLocation('office')">③ 旧西置賜郡役所</button>

            <div class="label" style="margin-top:10px;">表示モデル / 音声解説</div>
            <button id="m-all" onclick="switchModel('all')">全体(all)</button>
            <div class="model-row">
                <button id="m-kozakura" onclick="switchModel('kozakura')">旧西置賜郡役所</button>
                <button style="background:#ff9800; color:white;" onclick="playAudio('kozakura')">説明</button>
            </div>
            <div class="model-row">
                <button id="m-1st" onclick="switchModel('1st')">初代</button>
                <button style="background:#ff9800; color:white;" onclick="playAudio('1st')">説明</button>
            </div>
            <div class="model-row">
                <button id="m-2nd" onclick="switchModel('2nd')">二代目</button>
                <button style="background:#ff9800; color:white;" onclick="playAudio('2nd')">説明</button>
            </div>
            <button onclick="stopAllAudio()" style="background:#607d8b; color:white; margin-top:4px;">音声停止</button>
        </div>

        <div class="right-menu menu clickable ui-group">
            <div class="label">建物を回転</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button class="rotate-btn" onclick="adjustRotation(-30)">左回</button>
                <button class="rotate-btn" onclick="adjustRotation(30)">右回</button>
            </div>

            <div class="label" style="margin-top:10px;">高度 / サイズ</div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustHeight(0.5)">上昇</button>
                <button style="flex:1" onclick="adjustHeight(-0.5)">下降</button>
            </div>
            <div style="display:flex; gap:4px; width:100%;">
                <button style="flex:1" onclick="adjustScale(1.2)">拡大</button>
                <button style="flex:1" onclick="adjustScale(0.8)">縮小</button>
            </div>

            <button onclick="location.reload()" style="background:#f44336; color:white; margin-top:10px; width:100%;">再起動</button>
        </div>

        <div id="text-panel" class="ui-group">
            <div id="text-scroll"></div>
        </div>
        <div id="status-bar" class="ui-group">AR開始を押してください。</div>
    </div>

    <script type="module">
        import * as THREE from "https://esm.sh/three@0.160.0";
        import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
        import { clone } from "https://esm.sh/three@0.160.0/examples/jsm/utils/SkeletonUtils.js";
        import * as LocAR from "https://esm.sh/locar";

        const appData = {
            all: "all.glb",
            kozakura: "Gun.glb",
            "1st": "1st.glb",
            "2nd": "2nd.glb"
        };

        const audioFiles = {
            kozakura: "Kozakura_",
            "1st": "1st_NisiokitamaGunkai_",
            "2nd": "2nd_NishiokitamaGUnkai_"
        };

        const descriptions = {
            all: {
                Japanese: "文教の森 AR\n\n旧西置賜郡役所と会議事堂を含む建物群の全体像を、現在の風景の中に重ねて確認するための表示です。",
                English: "Bunkyo no Mori AR\n\nThis display overlays the former Nishiokitama District Office and assembly halls onto the present landscape.",
                Chinese: "文教之森 AR\n\n此画面将旧西置赐郡役所与会議事堂建筑群叠加到当前风景中进行展示。",
                Korean: "문교의 숲 AR\n\n이 화면은 구 니시오키타마 군역소와 군회의사당 건물군을 현재 풍경 위에 겹쳐 보여 줍니다."
            },
            kozakura: {
                Japanese: "旧西置賜郡役所\n\n旧西置賜郡役所は、明治11年に建てられた擬洋風建築です。現在は小桜館として保存・活用されています。",
                English: "Former Nishiokitama District Office\n\nThe former Nishiokitama District Office was built in 1878 and is preserved today as Kozakura-kan.",
                Chinese: "旧西置赐郡役所\n\n旧西置赐郡役所建于1878年，是具有代表性的拟洋风建筑，现以小樱馆之名保存利用。",
                Korean: "구 니시오키타마 군역소\n\n구 니시오키타마 군역소는 1878년에 세워진 의양풍 건축으로, 현재 고자쿠라칸으로 보존 활용되고 있습니다."
            },
            "1st": {
                Japanese: "初代旧西置賜郡会議事堂\n\n初代旧西置賜郡会議事堂は、明治20年に建てられた洋風木造の議事堂です。",
                English: "First Former Nishiokitama District Assembly Hall\n\nThe first Nishiokitama District Assembly Hall was built in 1887 as a Western-style wooden hall.",
                Chinese: "第一代旧西置赐郡会议事堂\n\n第一代旧西置赐郡会议事堂建于1887年，是一座西式木造议事堂。",
                Korean: "초대 구 니시오키타마 군회의사당\n\n초대 니시오키타마 군회의사당은 1887년에 세워진 서양식 목조 건물입니다."
            },
            "2nd": {
                Japanese: "2代目旧西置賜郡会議事堂\n\n2代目旧西置賜郡会議事堂は、明治44年10月に郡役所の北側へ新築された議事堂です。",
                English: "Second Former Nishiokitama District Assembly Hall\n\nThe second Nishiokitama District Assembly Hall was newly built in October 1911.",
                Chinese: "第二代旧西置赐郡会议事堂\n\n第二代旧西置赐郡会议事堂于1911年10月在郡役所北侧新建。",
                Korean: "2대 구 니시오키타마 군회의사당\n\n2대 니시오키타마 군회의사당은 1911년 10월 군청 북쪽에 새로 지어진 건물입니다."
            }
        };

        const locations = {
            tas: { lat: 38.1068, lon: 140.0400 },
            office: { lat: 38.10134, lon: 140.04299 }
        };

        const renderRoot = document.getElementById("render-root");
        const statusBar = document.getElementById("status-bar");
        const textPanel = document.getElementById("text-panel");
        const textScroll = document.getElementById("text-scroll");
        const uiToggleButton = document.getElementById("ui-toggle");

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderRoot.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x8899aa, 1.2));
        const dir = new THREE.DirectionalLight(0xffffff, 1.1);
        dir.position.set(10, 20, 5);
        scene.add(dir);

        const loader = new GLTFLoader();
        const anchorGroup = new THREE.Group();
        const contentRoot = new THREE.Group();
        const modelHolder = new THREE.Group();
        contentRoot.add(modelHolder);
        anchorGroup.add(contentRoot);

        let locar = null;
        let deviceControls = null;
        let webcam = null;
        let arStarted = false;
        let currentAudio = null;
        let currentLang = "Japanese";
        let currentModelKey = "all";
        let currentRotation = 0;
        let currentHeight = 0;
        let currentScale = 0.5;
        let userLoc = null;
        let lockedAnchorTarget = null;
        let lockedAnchorType = null;
        let uiVisible = true;
        let currentModelObject = null;
        let currentHeading = null;
        let panelHideTimer = null;
        const modelCache = new Map();

        function setStatus(message) {
            statusBar.innerText = message;
        }

        function toggleUi() {
            uiVisible = !uiVisible;
            document.body.classList.toggle("ui-hidden", !uiVisible);
            uiToggleButton.textContent = uiVisible ? "UI OFF" : "UI ON";
        }
        window.toggleUi = toggleUi;

        function degreesToRadians(deg) {
            return deg * Math.PI / 180;
        }

        function radiansToDegrees(rad) {
            return rad * 180 / Math.PI;
        }

        function destinationPoint(lat, lon, bearingDeg, distanceMeters) {
            const radius = 6378137;
            const bearing = degreesToRadians(bearingDeg);
            const lat1 = degreesToRadians(lat);
            const lon1 = degreesToRadians(lon);
            const angularDistance = distanceMeters / radius;

            const lat2 = Math.asin(
                Math.sin(lat1) * Math.cos(angularDistance) +
                Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing)
            );

            const lon2 = lon1 + Math.atan2(
                Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
                Math.cos(angularDistance) - Math.sin(lat1) * Math.sin(lat2)
            );

            return {
                lat: radiansToDegrees(lat2),
                lon: radiansToDegrees(lon2)
            };
        }

        function getCurrentDescription() {
            const group = descriptions[currentModelKey] || descriptions.all;
            return group[currentLang] || group.Japanese || "";
        }

        function showTextPanel(text) {
            const content = text || "";
            textScroll.textContent = content;
            textPanel.classList.add("show");

            requestAnimationFrame(() => {
                const panelHeight = textPanel.clientHeight;
                const textHeight = textScroll.scrollHeight;
                const fromY = panelHeight;
                const toY = -textHeight;
                const duration = Math.max(6000, content.length * 120);
                textScroll.animate(
                    [
                        { transform: `translate(-50%, ${fromY}px)` },
                        { transform: `translate(-50%, ${toY}px)` }
                    ],
                    {
                        duration,
                        easing: "linear",
                        fill: "forwards"
                    }
                );

                if (panelHideTimer) {
                    clearTimeout(panelHideTimer);
                }
                panelHideTimer = setTimeout(() => {
                    textPanel.classList.remove("show");
                }, duration + 3000);
            });
        }

        function applyModelTransform() {
            contentRoot.position.set(0, currentHeight, 0);
            contentRoot.scale.setScalar(currentScale);
            modelHolder.rotation.set(0, degreesToRadians(currentRotation), 0);
        }

        async function loadModelObject(key) {
            if (modelCache.has(key)) {
                return clone(modelCache.get(key));
            }

            const fileName = appData[key];
            const gltf = await loader.loadAsync(fileName);
            gltf.scene.traverse(obj => {
                if (obj.isMesh) {
                    obj.frustumCulled = false;
                    if (obj.material) {
                        obj.material.needsUpdate = true;
                    }
                }
            });
            modelCache.set(key, gltf.scene);
            return clone(gltf.scene);
        }

        async function switchModel(key) {
            currentModelKey = key;
            document.querySelectorAll(".left-menu button[id^='m-']").forEach(button => button.classList.remove("active-btn"));
            const btn = document.getElementById("m-" + key);
            if (btn) {
                btn.classList.add("active-btn");
            }

            setStatus(`モデルを読み込んでいます: ${key}`);
            try {
                const nextObject = await loadModelObject(key);
                if (currentModelObject) {
                    modelHolder.remove(currentModelObject);
                }
                currentModelObject = nextObject;
                modelHolder.add(currentModelObject);
                applyModelTransform();
                showTextPanel(getCurrentDescription());
                setStatus(`モデルを表示しました: ${key}`);
            } catch (error) {
                setStatus(`モデル読み込みに失敗しました: ${error.message || error}`);
            }
        }
        window.switchModel = switchModel;

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll(".top-center button[id^='lang-']").forEach(button => button.classList.remove("active-btn"));
            document.getElementById("lang-" + lang).classList.add("active-btn");
            showTextPanel(getCurrentDescription());
        }
        window.setLang = setLang;

        function adjustRotation(delta) {
            currentRotation += delta;
            applyModelTransform();
        }
        window.adjustRotation = adjustRotation;

        function adjustHeight(delta) {
            currentHeight += delta;
            applyModelTransform();
        }
        window.adjustHeight = adjustHeight;

        function adjustScale(factor) {
            currentScale *= factor;
            applyModelTransform();
        }
        window.adjustScale = adjustScale;

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }
        window.stopAllAudio = stopAllAudio;

        function playAudio(key) {
            currentModelKey = key;
            stopAllAudio();
            const fileName = `audio/${audioFiles[key]}${currentLang}.wav`;
            currentAudio = new Audio(fileName);
            currentAudio.play().catch(() => {
                setStatus("音声の再生に失敗しました。");
            });
            showTextPanel(getCurrentDescription());
        }
        window.playAudio = playAudio;

        function lockAnchor(target, type, message) {
            if (!locar || !target) {
                return;
            }

            lockedAnchorTarget = { lat: target.lat, lon: target.lon };
            lockedAnchorType = type;

            if (anchorGroup.parent) {
                anchorGroup.parent.remove(anchorGroup);
            }
            locar.add(anchorGroup, lockedAnchorTarget.lon, lockedAnchorTarget.lat, 0);

            document.querySelectorAll(".loc-btn").forEach(button => button.classList.remove("active-btn"));
            const btn = document.getElementById("btn-" + type);
            if (btn) {
                btn.classList.add("active-btn");
            }

            setStatus(message);
        }

        function resolveAnchorTarget(type) {
            if (type === "current") {
                if (!userLoc) {
                    return null;
                }
                const bearing = typeof currentHeading === "number" ? currentHeading : 0;
                return destinationPoint(userLoc.lat, userLoc.lon, bearing, 15);
            }
            return locations[type] || null;
        }

        function setAnchorLocation(type) {
            const target = resolveAnchorTarget(type);
            if (!target) {
                setStatus("現在地がまだ取得できていません。AR開始後、GPS取得を待ってください。");
                return;
            }

            if (type === "current") {
                lockAnchor(target, type, "現在地の前方15mに固定しました。以後はこのGPS座標へ固定します。");
            } else {
                lockAnchor(target, type, "指定地点に固定しました。以後はこのGPS座標へ固定します。");
            }
        }
        window.setAnchorLocation = setAnchorLocation;

        async function showDiagnostics() {
            const diagnostics = {
                secureContext: window.isSecureContext,
                protocol: window.location.protocol,
                host: window.location.host || "(file)",
                mediaDevices: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                geolocation: !!navigator.geolocation,
                arStarted,
                userLoc,
                lockedAnchorTarget
            };

            setStatus(`診断: secure=${diagnostics.secureContext} / media=${diagnostics.mediaDevices} / geo=${diagnostics.geolocation} / arStarted=${diagnostics.arStarted}`);
            console.log("[locar-diagnostics]", diagnostics);
        }
        window.showDiagnostics = showDiagnostics;

        async function startAr() {
            if (arStarted) {
                setStatus("ARは開始済みです。");
                return;
            }

            if (!window.isSecureContext) {
                setStatus("AR開始不可: HTTPS または localhost で開いてください。");
                return;
            }

            try {
                setStatus("カメラとGPSを初期化しています...");

                webcam = new LocAR.Webcam({
                    video: {
                        facingMode: { ideal: "environment" }
                    }
                });

                webcam.addEventListener("webcamstarted", event => {
                    scene.background = event.detail.texture;
                    setStatus("カメラ映像を開始しました。GPSを待っています...");
                });

                webcam.addEventListener("webcamerror", event => {
                    setStatus(`カメラ開始に失敗しました: ${event.detail?.message || "unknown"}`);
                });

                await webcam.start();

                locar = new LocAR.LocationBased(scene, camera);
                locar.on("gpsupdate", event => {
                    const coords = event.coords || event.detail?.coords;
                    if (!coords) {
                        return;
                    }

                    userLoc = {
                        lat: coords.latitude,
                        lon: coords.longitude,
                        accuracy: coords.accuracy
                    };

                    if (!lockedAnchorTarget) {
                        setStatus("GPS OK。固定場所を選んでください。");
                    }
                });

                locar.on("gpserror", error => {
                    const message = error?.message || error?.detail?.message || "unknown";
                    setStatus(`GPS取得に失敗しました: ${message}`);
                });

                deviceControls = new LocAR.DeviceOrientationControls(camera);
                deviceControls.addEventListener("deviceorientation", event => {
                    if (typeof event?.detail?.alpha === "number") {
                        currentHeading = (360 - event.detail.alpha + 360) % 360;
                    }
                });
                deviceControls.addEventListener("deviceorientationgranted", () => {
                    setStatus("方位センサーを許可しました。");
                });
                deviceControls.addEventListener("deviceorientationerror", event => {
                    setStatus(`方位センサーに失敗しました: ${event?.detail?.message || "unknown"}`);
                });

                await deviceControls.init();
                locar.startGps();
                arStarted = true;
                await switchModel("all");
            } catch (error) {
                setStatus(`AR開始に失敗しました: ${error.message || error}`);
            }
        }
        window.startAr = startAr;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
