<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR - 自動正面配置版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; font-size: 13px; cursor: pointer; }
        .active-btn { background: #4CAF50 !important; color: white; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 30%; left: 10px; }
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        
        #log-panel { 
            position: absolute; top: 10px; right: 10px; width: 240px; height: 160px; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-panel">
            [STATUS] <span id="log-status">位置取得中...</span><br>
            [TARGET] <span id="log-file" style="color:cyan">---</span><br>
            [DIST] 建物まで約5m固定<br>
            --------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button id="btn-all" onclick="spawnInFront('all.glb', '全体')">全体表示</button>
            <button id="btn-kozakura" onclick="spawnInFront('Gun.glb', '小桜館')">小桜館</button>
            <button id="btn-1st" onclick="spawnInFront('1st.glb', '初代')">初代</button>
            <button id="btn-2nd" onclick="spawnInFront('2nd.glb', '二代目')">二代目</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="adjustHeight(1)">建物を高く (+1m)</button>
            <button onclick="adjustHeight(-1)">建物を低く (-1m)</button>
            <button onclick="rotateModel(45)">45度回転</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#f44336; color:white;">再起動（現在地で再配置）</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        <a-entity id="ar-anchor" scale="50 50 50">
            <a-entity id="main-model" gltf-model=""></a-entity>
        </a-entity>
        
        <a-camera gps-camera rotation-reader near="0.1" far="10000"></a-camera>
    </a-scene>

    <script>
        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function addHistory(msg) {
            const hist = document.getElementById('log-history');
            hist.innerHTML = "> " + msg + "<br>" + hist.innerHTML;
        }

        // 自分の現在地の「5m北」に建物を召喚する関数
        function spawnInFront(file, name) {
            document.getElementById('log-file').innerText = name;
            
            // 現在のGPS位置を取得
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // 緯度を約5m分だけ北にずらす（1度 ≒ 111km なので、0.000045度 ≒ 5m）
                const targetLat = lat + 0.000045; 
                const targetLon = lon;

                anchor.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLon};`);
                model.setAttribute('gltf-model', file);
                
                addHistory(`${name}を正面5mに配置`);
                document.getElementById('log-status').innerText = "配置完了";
            }, (err) => {
                addHistory("GPSエラー: 許可を確認してください", true);
            });
        }

        function adjustHeight(val) {
            let p = anchor.getAttribute('position') || {x:0, y:0, z:0};
            p.y += val;
            anchor.setAttribute('position', p);
            addHistory(`高さ調整: ${p.y}m`);
        }

        function rotateModel(deg) {
            let r = anchor.getAttribute('rotation') || {x:0, y:0, z:0};
            r.y += deg;
            anchor.setAttribute('rotation', r);
        }

        model.addEventListener('model-loaded', () => {
            document.getElementById('log-status').innerText = "表示成功";
        });

        // 起動時に「全体」を自動配置
        window.onload = () => {
            setTimeout(() => { spawnInFront('all.glb', '全体'); }, 2000); // 起動2秒後に配置
        };
    </script>
</body>
</html>
