<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>文教の森 AR - 固定改善版</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #000;
      touch-action: none;
    }
    #ui-layer {
      position: absolute;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }
    .clickable { pointer-events: auto; }
    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: white;
      font-weight: bold;
      font-size: 11px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
      color: #333;
      touch-action: manipulation;
    }
    .active-btn {
      background: #4caf50 !important;
      color: white;
    }
    .loc-btn {
      background: #2196f3;
      color: white;
      width: 100%;
    }
    .label {
      color: white;
      font-size: 10px;
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
      margin-bottom: 2px;
    }
    .menu {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .left-menu {
      top: 20px;
      left: 10px;
      width: 160px;
    }
    .right-menu {
      top: 20px;
      right: 10px;
      align-items: flex-end;
      width: 120px;
    }
    #status-bar {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      color: #0f0;
      background: rgba(0,0,0,0.5);
      font-size: 12px;
      padding: 6px 0;
    }
  </style>
</head>
<body>
  <div id="ui-layer">
    <div class="left-menu menu clickable">
      <div class="label">建物を配置・固定</div>
      <button class="loc-btn" onclick="setAnchorLocation('current')">① 現在地の北へ約15m</button>
      <button class="loc-btn" onclick="setAnchorLocation('office')">② 旧西置賜郡役所</button>

      <div class="label" style="margin-top:12px;">モデル選択</div>
      <button id="m-all" onclick="switchModel('all')">全体(all)</button>
      <button id="m-2nd" onclick="switchModel('2nd')">二代目議事堂</button>
      <button id="m-1st" onclick="switchModel('1st')">初代議事堂</button>
    </div>

    <div class="right-menu menu clickable">
      <div class="label">建物を回転</div>
      <button style="background:#9c27b0; color:white; width:100%;" onclick="adjustRotation(30)">右に30度回転</button>

      <div class="label" style="margin-top:12px;">高度 / サイズ</div>
      <div style="display:flex; gap:4px; width:100%;">
        <button style="flex:1" onclick="adjustHeight(1)">上昇</button>
        <button style="flex:1" onclick="adjustHeight(-1)">下降</button>
      </div>
      <div style="display:flex; gap:4px; width:100%;">
        <button style="flex:1" onclick="adjustScale(1.2)">拡大</button>
        <button style="flex:1" onclick="adjustScale(0.8)">縮小</button>
      </div>

      <button onclick="location.reload()" style="background:#f44336; color:white; margin-top:12px; width:100%;">再起動</button>
    </div>

    <div id="status-bar">GPSを取得中...</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <!-- GPS固定対象を1つに集約 -->
    <a-entity
      id="main-model"
      gps-entity-place="latitude: 0; longitude: 0;"
      gltf-model=""
      position="0 0 0"
      rotation="0 0 0"
      scale="0.5 0.5 0.5"
      visible="false"
      frustum-culled="false">
    </a-entity>

    <a-camera
      gps-camera="gpsMinDistance: 5; positionMinAccuracy: 30;"
      rotation-reader
      look-controls="enabled: true; magicWindowTrackingEnabled: true; touchEnabled: false; mouseEnabled: false">
    </a-camera>
  </a-scene>

  <script>
    const appData = {
      all: "all.glb",
      kozakura: "Gun.glb",
      "1st": "1st.glb",
      "2nd": "2nd.glb"
    };

    const locations = {
      office: { lat: 38.10134, lon: 140.04299 }
    };

    let userLoc = null;
    let currentRotation = 0;
    let currentHeight = 0;
    let currentScale = 0.5;

    const model = document.getElementById("main-model");
    const statusBar = document.getElementById("status-bar");

    function switchModel(k) {
      if (!appData[k]) return;
      model.setAttribute("gltf-model", appData[k]);

      document.querySelectorAll(".left-menu button[id^='m-']").forEach(b => {
        b.classList.remove("active-btn");
      });

      const btn = document.getElementById("m-" + k);
      if (btn) btn.classList.add("active-btn");
    }

    function setAnchorLocation(type) {
      let target = null;

      if (type === "current") {
        if (!userLoc) {
          statusBar.innerText = "まだGPSが取れていません。少し待ってください。";
          return;
        }

        // 北へ約15〜17m
        target = {
          lat: userLoc.lat + 0.00015,
          lon: userLoc.lon
        };
      } else {
        target = locations[type];
      }

      if (!target) {
        statusBar.innerText = "配置先が見つかりません。";
        return;
      }

      model.setAttribute("gps-entity-place", `latitude: ${target.lat}; longitude: ${target.lon};`);
      model.setAttribute("visible", "true");

      // 再計算を促す
      setTimeout(() => {
        window.dispatchEvent(new Event("resize"));
      }, 300);

      statusBar.innerText = "建物をGPS位置に固定しました。歩いて確認してください。";

      if (!model.getAttribute("gltf-model")) {
        switchModel("all");
      }
    }

    function adjustRotation(deg) {
      currentRotation += deg;
      model.setAttribute("rotation", `0 ${currentRotation} 0`);
    }

    function adjustScale(factor) {
      currentScale *= factor;
      model.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
    }

    function adjustHeight(delta) {
      currentHeight += delta;
      model.setAttribute("position", `0 ${currentHeight} 0`);
    }

    navigator.geolocation.watchPosition(
      (pos) => {
        userLoc = {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude
        };

        const acc = Math.round(pos.coords.accuracy || 999);

        if (acc <= 30) {
          statusBar.innerText = `GPS OK（精度 約${acc}m）。場所を選択してください。`;
        } else {
          statusBar.innerText = `GPS受信中（精度 約${acc}m）。できれば屋外で少し待ってください。`;
        }
      },
      (err) => {
        statusBar.innerText = "GPS取得エラー: " + err.message;
      },
      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 15000
      }
    );

    // iPhoneの方位センサー許可
    document.addEventListener("click", async () => {
      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const res = await DeviceOrientationEvent.requestPermission();
          console.log("DeviceOrientation permission:", res);
        }
      } catch (e) {
        console.warn(e);
      }
    }, { once: true });
  </script>
</body>
</html>
